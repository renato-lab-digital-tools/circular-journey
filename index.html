var CE=[{"id":1,"zh":"循環設計","en":"Design for Circularity","qz":"就本次產品而言，貴公司是否在設計或開發時，明確要求產品更容易維修、保養、升級、拆解、再次使用、翻新、再製造或回收？","qe":"For this product, has your company explicitly required during design or development that it be easier to maintain, repair, upgrade, disassemble, reuse, refurbish, remanufacture or recycle?","pz":"在設計或開發時，明確要求產品更容易維修、保養、升級、拆解、再次使用、翻新、再製造或回收。","pe":"During design or development, explicitly require the product to be easier to maintain, repair, upgrade, disassemble, reuse, refurbish, remanufacture or recycle.","examplesZ":["將可維修、可換件、可拆解或可升級寫入設計要求","採用模組化、標準化介面或常用固定件","為高故障或高耗損零件保留拆裝空間","設定耐久、零件壽命、材料分離或回收相容性要求","在設計審查時檢查後續維修、翻新或回收可行性"],"examplesE":["Include repairability, replaceable parts, disassembly or upgradeability in design requirements","Use modular designs, standard interfaces or commonly available fasteners","Provide access space for parts with high failure or wear rates","Set requirements for durability, part life, material separation or recycling compatibility","Check downstream repair, refurbishment or recycling feasibility during design reviews"],"tracesZ":["文件／規範：產品需求書、設計規格、設計檢核表、DFMEA、工程圖、BOM、設計變更單","紀錄／數據：耐久測試、拆裝時間、可換件清單、維修性測試、拆解試驗","系統／實體：模組接口、維修孔位、標準件、可拆卸總成、零件識別"],"tracesE":["Documents: product requirements, design specifications, design checklists, DFMEA, drawings, BOMs and engineering changes","Records and data: durability tests, disassembly time, replaceable-part lists, maintainability tests and disassembly trials","Systems or physical evidence: module interfaces, service access points, standard parts, removable assemblies and part identification"],"nonZ":["只說產品品質好、耐用或環保","只有長保固，但設計本身未支援維修或換件","只改善生產效率","只採用某種環保材料，但未改變產品壽命或價值回復設計"],"nonE":["General claims that the product is high quality, durable or environmentally friendly","A long warranty without design features that support repair or part replacement","Production-efficiency improvements only","Using an environmentally preferable material without changing product life or value-retention design"],"defZ":"循環設計是依循環經濟原則進行解決方案的設計與開發，以減少資源使用、延長產品壽命，並使產品或資源易於維護、修理、升級、再使用、翻新、再製造及價值回復。","defE":"Design for circularity is the design and development of solutions based on circular economy principles to minimize resource use, prolong product life, and enable products or resources to be maintained, repaired, upgraded, reused, refurbished, remanufactured and recovered."},{"id":2,"zh":"循環資源選用","en":"Circular Sourcing","qz":"就本次產品而言，貴公司是否實際選用或明確要求再生材料、符合條件的可再生資源、原生資源替代方案，或避免特定令人關切的有害物質？","qe":"For this product, does your company actually use or formally require recycled materials, qualifying renewable resources, alternatives to virgin resources, or avoidance of specified substances of concern?","pz":"實際選用或明確要求再生材料、符合條件的可再生資源、原生資源替代方案，或避免特定令人關切的有害物質。","pe":"Use or formally require recycled materials, qualifying renewable resources, alternatives to virgin resources, or avoidance of specified substances of concern.","examplesZ":["設定鋼、塑膠、紙材等再生料含量","採用可追溯且符合條件的可再生材料","以回收件、再使用件或替代材料減少原生投入","將特定關切物質列為禁限用或替代要求","要求回收材料的安全性、品質與適用性"],"examplesE":["Set recycled-content requirements for steel, plastics, paper or other materials","Use traceable renewable materials that meet defined conditions","Use recovered, reused or substitute inputs to reduce virgin-resource use","Specify prohibited, restricted or substitute substances","Require the safety, quality and suitability of recycled materials"],"tracesZ":["文件／規範：材料規格、BOM、禁限用物質清單、材料承認書、替代材料評估","紀錄／數據：再生料比例、來源批次、物質檢測、供應商聲明、Chain of Custody","系統／實體：ERP材料屬性、材料追溯碼、SDS、RoHS／REACH資料、第三方驗證"],"tracesE":["Documents: material specifications, BOMs, restricted-substance lists, material approvals and substitution assessments","Records and data: recycled-content percentages, source batches, substance tests, supplier declarations and chain-of-custody records","Systems or physical evidence: ERP material attributes, traceability codes, SDSs, RoHS/REACH data and third-party verification"],"nonZ":["只因材料可以回收，就說已使用循環資源","只選本地供應商、知名品牌或高品質材料","只改變供應商評分，沒有改變材料選擇","可再生材料沒有永續來源或補充速度依據"],"nonE":["Calling a material circular simply because it is recyclable","Choosing only local, well-known or high-quality suppliers","Changing supplier scores without changing material selection","Using renewable materials without evidence of sustainable sourcing or replenishment"],"defZ":"循環資源選用是在整個生命週期中選擇與取得資源時，減少資源使用，優先採用已回復及可再生資源，替代原生資源與關切物質，並在兼顧安全及生命週期衝擊的條件下使用已回復或已使用的資源與產品。","defE":"Circular sourcing is the selection and acquisition of resources across the life cycle that minimizes resource use, gives preference to recovered and renewable resources, substitutes virgin resources and substances of concern, and sources recovered or used resources and products safely while considering their life cycle impacts."},{"id":3,"zh":"循環採購","en":"Circular Procurement","qz":"貴公司是否把與產品壽命、材料來源、維修、回收或生命週期成本有關的要求，正式放進採購規格、供應商評選、合約或驗收流程？","qe":"Has your company formally included requirements relating to product life, material origin, repair, recovery or life-cycle cost in purchasing specifications, supplier selection, contracts or acceptance procedures?","pz":"將產品壽命、材料來源、維修、回收或生命週期成本相關要求，正式納入採購規格、供應商評選、合約或驗收流程。","pe":"Formally include requirements relating to product life, material origin, repair, recovery or life-cycle cost in purchasing specifications, supplier selection, contracts or acceptance procedures.","examplesZ":["在RFQ／RFP或圖面規格中要求再生料、耐久、可維修或可拆解","將備件供應年限、維修文件或回收責任寫入合約","在供應商評鑑中加入材料追溯、減廢或回收資料","採購可維修、翻新或再使用產品與服務","以TCO或剩餘價值納入採購決策"],"examplesE":["Include recycled content, durability, repairability or disassembly requirements in RFQs, RFPs or drawings","Write spare-parts availability, repair documentation or take-back responsibilities into contracts","Add traceability, waste-reduction or recovery data to supplier evaluations","Procure repairable, refurbished or reusable products and services","Factor total cost of ownership or residual value into procurement decisions"],"tracesZ":["文件／規範：採購政策、採購指南、RFQ／RFP、供應商評鑑表、合約、驗收標準","紀錄／數據：評選分數、供應商改善要求、合約審查、驗收不符合紀錄","系統／實體：SRM／ERP採購條件、供應商資料欄位、核准流程"],"tracesE":["Documents: procurement policies, purchasing guides, RFQs/RFPs, supplier scorecards, contracts and acceptance criteria","Records and data: evaluation scores, supplier corrective actions, contract reviews and non-conformance records","Systems or physical evidence: SRM/ERP purchasing conditions, supplier data fields and approval workflows"],"nonZ":["單次買到一個較環保產品","採購只看價格、品質與交期","只有口頭偏好或自願性建議","供應商有ISO證書，但採購決策未納入循環條件"],"nonE":["A one-off purchase of a product marketed as greener","Purchasing decisions based only on price, quality and delivery","Informal preferences or voluntary suggestions","A supplier holding an ISO certificate when circular criteria do not affect the purchasing decision"],"defZ":"循環採購是將循環性系統性納入策略、管理及作業層級的採購政策與流程。它先判斷是否確有採購必要；如需採購，則透過產品、服務或解決方案的選擇、供應商要求及契約安排，促進資源循環並改善全生命週期影響。","defE":"Circular procurement is the systematic integration of circularity into procurement policies and processes at strategic, management and operational levels. It first questions whether a purchase is necessary and, where procurement is needed, uses the selection of products, services or solutions, supplier requirements and contractual arrangements to support resource cycles and improve whole-life-cycle impacts."},{"id":4,"zh":"製程優化","en":"Process Optimization","qz":"貴公司是否曾改變本產品的生產或相關流程，使每單位產品使用較少材料、能源或水，或產生較少廢料、損失與排放，並有改善前後的比較？","qe":"Has your company changed production or related processes for this product so that each unit uses less material, energy or water, or generates less waste, loss or emissions, with a comparison before and after the change?","pz":"改變本產品的生產或相關流程，使每單位產品使用較少材料、能源或水，或產生較少廢料、損失與排放，並能比較改善前後結果。","pe":"Change production or related processes so that each product unit uses less material, energy or water, or generates less waste, loss and emissions, with a before-and-after comparison.","examplesZ":["提升良率、減少報廢與重工","縮短或刪除不必要製程、降低換線損失","導入節能設備、熱回收、循環水或溶劑回收","改善裁切、排版、投料或製程參數以減少材料耗用","將副產物或餘料回到同一流程使用"],"examplesE":["Improve yield and reduce scrap or rework","Remove unnecessary process steps or reduce changeover losses","Install energy-efficient equipment, heat recovery, water recirculation or solvent recovery","Optimise cutting, nesting, dosing or process parameters to reduce material use","Return by-products or surplus material into the same process"],"tracesZ":["文件／規範：改善專案書、A3／Kaizen、製程變更、設備投資評估、SOP","紀錄／數據：單位材料、能耗、水耗、良率、廢料量、排放量的前後數據","系統／實體：MES、能源管理系統、流量計、秤重、廢料台帳、製程監控"],"tracesE":["Documents: improvement projects, A3/Kaizen reports, process changes, equipment investment assessments and SOPs","Records and data: before-and-after material, energy, water, yield, waste or emissions data per unit","Systems or physical evidence: MES, energy-management systems, meters, weighing records, waste ledgers and process monitoring"],"nonZ":["只提高產量，單位資源效率沒有改善","只降低成本，未確認資源或排放結果","把廢料或污染轉移到另一流程","只有改善構想，沒有實際變更或比較結果"],"nonE":["Increasing output without improving resource efficiency per unit","Reducing cost without checking resource or emissions outcomes","Moving waste or pollution to another process","An improvement idea without an implemented change or before-and-after comparison"],"defZ":"流程最佳化是在生產流程，以及建築物或區域的供應鏈中，調整資源流與作業流程，以提升資源與能源效率、永續使用水資源，並減少或消除廢棄物、有害損失與釋放。","defE":"Process optimization is the adjustment of resource flows and operating processes in production and in supply chains for buildings or regions to improve resource and energy efficiency, use water sustainably, and reduce or eliminate waste and harmful losses and releases."},{"id":5,"zh":"產業、區域或城市共生","en":"Industrial, Regional or Urban Symbiosis","qz":"貴公司是否與另一個組織建立持續運作的資源共享或交換，讓一方的剩餘能源、水、副產品、材料或閒置設施成為另一方的投入？","qe":"Has your company established an ongoing resource-sharing or exchange arrangement with another organisation, so that one party’s surplus energy, water, by-products, materials or idle facilities become inputs for the other?","pz":"與另一個組織建立持續運作的資源共享或交換，讓一方的剩餘能源、水、副產品、材料或閒置設施成為另一方的投入。","pe":"Maintain an ongoing resource-sharing or exchange arrangement with another organisation, so that one party’s surplus energy, water, by-products, materials or idle facilities become inputs for the other.","examplesZ":["將副產品、邊料或廢熱穩定供另一家企業使用","使用其他企業產生的剩餘材料作為原料","與鄰近企業共享蒸汽、循環水、污水處理、倉儲或設備","建立園區或區域型資源交換機制"],"examplesE":["Regularly supply by-products, offcuts or waste heat for use by another company","Use surplus materials from another organisation as inputs","Share steam, recirculated water, wastewater treatment, warehousing or equipment with nearby organisations","Operate an industrial-park or regional resource-exchange mechanism"],"tracesZ":["文件／規範：合作合約、MOU、資源品質規格、共同操作規則","紀錄／數據：資源流量、交付批次、替代原料量、共同成本與效益","系統／實體：管線、共用設備、交接單、秤重／計量、發票與物流紀錄"],"tracesE":["Documents: cooperation agreements, MOUs, resource-quality specifications and shared operating rules","Records and data: resource flows, delivery batches, substituted material quantities, shared costs and benefits","Systems or physical evidence: pipelines, shared equipment, handover records, weighing or metering, invoices and logistics records"],"nonZ":["單一公司內部回用，較接近#4","一般廢棄物清運或廢料出售","只有合作意向或媒合會議","一般供應商買賣，沒有剩餘資源／設施共享機制"],"nonE":["Internal reuse within one company, which is closer to Action 4","Routine waste collection or sale of scrap","An intention to cooperate or a matchmaking meeting only","Ordinary supplier transactions without sharing surplus resources or facilities"],"defZ":"產業、區域或城市共生，是由原本相互分離的組織採取集體協作，共享或交換投入、產出、解決方案、資訊、基礎設施或能力，以形成循環資源流並最佳化價值網絡。","defE":"Industrial, regional or urban symbiosis is a collective approach in which traditionally separate organizations share or exchange inflows, outflows, solutions, information, infrastructure or capabilities to create circular resource flows and optimize value networks."},{"id":6,"zh":"減量、再使用與變更用途","en":"Reduce, Reuse and Repurpose","qz":"貴公司是否曾避免製造或購買新的產品／資源，或讓使用過的產品、零組件在不被破壞的情況下再次使用，或改作其他用途？","qe":"Has your company avoided making or purchasing new products or resources, reused products or components without destroying them, or repurposed them for another use?","pz":"避免製造或購買新的產品或資源，讓使用過的產品或零組件在不被破壞的情況下再次使用，或改作其他用途。","pe":"Avoid making or purchasing new products or resources, reuse products or components without destroying them, or repurpose them for another use.","examplesZ":["減少產品或材料需求，例如輕量化、共用治具或避免一次性物件","回收整機、包裝、托盤、容器或零組件後再次使用","將退回、閒置或汰換設備重新部署","將不能維持原功能的物件改作另一功能","使用合格舊件替代新品零件"],"examplesE":["Reduce product or material demand through lightweighting, shared tooling or avoiding single-use items","Collect and reuse whole products, packaging, pallets, containers or components","Redeploy returned, idle or retired equipment","Repurpose an item that can no longer perform its original function","Use qualified used parts in place of new components"],"tracesZ":["文件／規範：再使用標準、退回／重新部署程序、替代材料或減量設計變更","紀錄／數據：避免採購數量、回用品件數、再部署資產、舊件入庫、替代新品估算","系統／實體：ERP庫存移轉、回收容器、舊件庫、資產移轉單、再使用標示"],"tracesE":["Documents: reuse standards, return or redeployment procedures, substitution decisions and design changes for reduction","Records and data: avoided purchases, reused-item counts, redeployed assets, returned-part inventory and estimated avoided new products","Systems or physical evidence: ERP inventory transfers, returnable containers, used-part stores, asset transfer forms and reuse labels"],"nonZ":["把材料破碎、熔融後再利用，屬#14／#16","維修原產品但未再次投入使用，只屬#7的一部分","物件只是從一處移到另一處，沒有避免新品或新資源","宣稱減量但無法指出被避免的需求"],"nonE":["Breaking down or melting material for reuse, which is closer to Actions 14 or 16","Repairing a product without putting it back into use","Moving an item without avoiding demand for a new product or resource","Claiming reduction without identifying the demand that was avoided"],"defZ":"減量、再使用與變更用途包括：降低產品需求及相關資源使用；讓產品或零組件再次用於原設計目的；以及在不大幅改變其物理、化學或機械結構的情況下，將產品或零組件改用於不同功能。","defE":"Reduce, reuse and repurpose comprise reducing product demand and related resource use; using products or components again for the purpose for which they were originally designed; and adapting products or components to a different function without major changes to their physical, chemical or mechanical structure."},{"id":7,"zh":"維護與維修","en":"Maintenance and Repair","qz":"貴公司是否對本產品提供或執行定期保養、狀態監測或故障維修，使產品能維持或恢復原有功能，而不是因故障提早報廢？","qe":"Does your company provide or carry out scheduled maintenance, condition monitoring or fault repair for this product, so that it maintains or regains its intended function rather than being discarded early?","pz":"對本產品提供或執行定期保養、狀態監測或故障維修，使產品維持或恢復原有功能，而不因故障提早報廢。","pe":"Provide or carry out scheduled maintenance, condition monitoring or fault repair so that the product maintains or regains its intended function rather than being discarded early.","examplesZ":["預防性保養、定期檢查、校正與耗材更換","透過感測或故障碼進行預測性維護","故障診斷、零件更換與功能修復","提供備件、維修手冊、技師或授權服務據點","延長保固或維修服務合約"],"examplesE":["Preventive maintenance, scheduled inspection, calibration and consumable replacement","Predictive maintenance using sensors or fault codes","Fault diagnosis, part replacement and functional repair","Provide spare parts, repair manuals, technicians or authorised service locations","Offer extended warranties or repair-service contracts"],"tracesZ":["文件／規範：保養計畫、維修手冊、零件目錄、服務SOP、保固條款","紀錄／數據：工單、故障碼、維修時間、備件使用、返修率、MTBF／MTTR","系統／實體：服務中心、備件庫、遠端診斷平台、維修工具、技師資格"],"tracesE":["Documents: maintenance plans, repair manuals, parts catalogues, service SOPs and warranty terms","Records and data: work orders, fault codes, repair time, spare-part use, repeat-repair rates and MTBF/MTTR","Systems or physical evidence: service centres, spare-part stores, remote-diagnostics platforms, repair tools and technician qualifications"],"nonZ":["只清潔外觀，沒有維持或恢復功能","直接換新整台產品，不嘗試修復","全面重建至新品水準，較接近#11","只有設計上『可能可修』，但沒有可執行服務條件"],"nonE":["Cleaning appearance without maintaining or restoring function","Replacing the entire product without attempting repair","Rebuilding to new-product condition, which is closer to Action 11","A product that is theoretically repairable but lacks workable service arrangements"],"defZ":"維護與維修是透過預防性或預測性維護，防止產品喪失功能，或將故障、損壞的產品恢復至足以執行其預定用途的狀態，使原有功能得以持續。備用零件、操作指引及維修服務是重要促成條件。","defE":"Maintenance and repair prevent a product from losing its function through preventive or predictive maintenance, or restore a malfunctioning or damaged product to the condition needed to perform its intended purpose, allowing its original function to continue. Spare parts, instructions and repair services are important enabling conditions."},{"id":8,"zh":"績效導向循環模式","en":"Performance-based Approaches","qz":"貴公司是否不是單純出售產品，而是以租賃、訂閱、按使用量或按績效收費提供產品功能，並由貴公司或指定方持續承擔維護、回收或生命週期末責任？","qe":"Rather than only selling the product, does your company provide its function through leasing, subscription, pay-per-use or performance-based charging, while your company or a designated party retains ongoing maintenance, return or end-of-life responsibilities?","pz":"不只出售產品，而以租賃、訂閱、按使用量或按績效收費提供產品功能，並由貴公司或指定方持續承擔維護、回收或生命週期末責任。","pe":"Provide product function through leasing, subscription, pay-per-use or performance-based charging rather than only selling the product, while retaining ongoing maintenance, return or end-of-life responsibilities.","examplesZ":["固定期間租賃或訂閱，供應方保有所有權","依使用次數、時間、處理量或產出收費","依可用率、節能量、產能或服務水準收費","方案包含維護、零件、資產管理與合約結束回收","收回資產再部署、翻新或回收"],"examplesE":["Fixed-term leasing or subscription where the provider retains ownership","Charging by use, time, throughput or output","Charging against availability, energy savings, capacity or service levels","Include maintenance, parts, asset management and return at contract end","Recover assets for redeployment, refurbishment or recycling"],"tracesZ":["文件／規範：租賃／訂閱／績效合約、SLA、回收與剩餘價值條款","紀錄／數據：使用量、績效、可用率、資產利用率、維修成本、退回數量","系統／實體：資產台帳、計量／計費系統、維護平台、回收與再部署流程"],"tracesE":["Documents: lease, subscription or performance contracts, SLAs, return clauses and residual-value terms","Records and data: usage, performance, availability, asset utilisation, maintenance cost and returned-unit data","Systems or physical evidence: asset registers, metering or billing systems, maintenance platforms and return or redeployment processes"],"nonZ":["分期付款或完成付款後移轉所有權","一般融資租賃，供應方不負生命週期責任","只提供維修合約，但產品功能仍以買斷取得","只有服務名稱，沒有所有權、責任與回流安排"],"nonE":["Instalment payments or transfer of ownership after payment","Conventional finance leasing with no provider life-cycle responsibility","A repair contract where product function is still obtained through outright purchase","A service label without clear ownership, responsibility and return arrangements"],"defZ":"績效導向循環模式是由使用者取得產品所提供的功能或服務，而非購買產品本身；服務提供者保有產品所有權，並負責保養、維護及生命週期末管理。該模式須透過提升使用密集度、延長產品壽命及減少不可回復資源，實現較高的資源效率。","defE":"A performance-based approach enables users to obtain the function or service provided by a product rather than purchasing the product itself. The service provider retains ownership and responsibility for upkeep, maintenance and end-of-life management, while the model achieves higher resource efficiency by increasing use intensity, extending product life and reducing non-recoverable resources."},{"id":9,"zh":"透過共享提升使用密集度","en":"Sharing to Intensify Use","qz":"貴公司是否建立一個可運作的機制，讓多位使用者依序或共同使用同一項耐用產品或資產，並因此提高使用率或減少新增產品需求？","qe":"Has your company established a workable mechanism for multiple users to use the same durable product or asset sequentially or jointly, increasing utilisation or reducing demand for additional products?","pz":"建立可運作的機制，讓多位使用者依序或共同使用同一項耐用產品或資產，以提高使用率或減少新增產品需求。","pe":"Operate a workable mechanism for multiple users to use the same durable product or asset sequentially or jointly, increasing utilisation or reducing demand for additional products.","examplesZ":["建立共享設備池、工具庫、車隊或資產平台","讓不同客戶在不同期間輪流使用同一資產","提供多使用者預約、身份、付款與調度機制","跨部門共用低使用率設備","管理共享資產的維護與生命週期末回收"],"examplesE":["Operate a shared equipment pool, tool library, fleet or asset platform","Allow different customers to use the same asset at different times","Provide booking, identity, payment and dispatch functions for multiple users","Share underused equipment across departments","Manage the maintenance and end-of-life recovery of shared assets"],"tracesZ":["文件／規範：共享規則、使用合約、資產調度與維護規範","紀錄／數據：預約、使用者數、使用率、閒置率、避免購置數量、運輸影響","系統／實體：共享平台、設備池、預約系統、存取控制、共同維修安排"],"tracesE":["Documents: sharing rules, user contracts, asset-dispatch and maintenance requirements","Records and data: bookings, user counts, utilisation, idle time, avoided purchases and transport impacts","Systems or physical evidence: sharing platforms, asset pools, booking systems, access control and shared maintenance arrangements"],"nonZ":["將產品賣給一家自助服務或共享平台，就說製造商已執行共享","單一客戶專用的租賃","二手轉售","共享造成額外運輸、過度使用或壽命縮短，卻未評估淨資源效果"],"nonE":["Selling a product to a self-service or sharing platform and treating that as operating sharing","Leasing an asset exclusively to one customer","Second-hand resale","Sharing that increases transport, overuse or shortened life without assessing the net resource effect"],"defZ":"透過共享提升使用密集度，是讓多位使用者共享耐久資產、產品或服務的使用機會，以提高利用率並降低個別持有產品的需求。此模式應在生命週期基礎上產生淨資源節省及衝擊降低，且不妨礙產品延壽及生命週期末的回復或回收再生。","defE":"Sharing to intensify use provides multiple users with shared access to durable assets, products or services to increase utilization and reduce the need for individually owned products. It should deliver net resource savings and life-cycle impact reductions without compromising product-life extension or end-of-life recovery and recycling."},{"id":10,"zh":"翻新","en":"Refurbishing","qz":"貴公司是否把使用過的整項產品收回後，進行有限度修復、零件更換或軟硬體更新，使它恢復原有或接近原有功能，再次投入使用？","qe":"Does your company take back a used complete product and carry out limited repair, part replacement or software and hardware updates so that it regains its original or near-original function and can be used again?","pz":"收回使用過的完整產品，進行有限度修復、零件更換或軟硬體更新，使其恢復原有或接近原有功能並再次使用。","pe":"Take back a used complete product and carry out limited repair, part replacement or software and hardware updates so that it regains its original or near-original function and can be used again.","examplesZ":["收回舊產品後進行檢查、清潔與狀態分級","更換磨耗件、故障件或過時模組","更新軟體、韌體或功能","完成功能、安全與品質測試","以翻新品再次銷售、出租或重新部署"],"examplesE":["Inspect, clean and grade returned used products","Replace worn, failed or obsolete parts and modules","Update software, firmware or functions","Complete functional, safety and quality tests","Resell, lease or redeploy the refurbished products"],"tracesZ":["文件／規範：翻新SOP、分級標準、標準更換件清單、測試規格、翻新品保固","紀錄／數據：入廠檢查、換件BOM、翻新工單、測試報告、翻新數量與流向","系統／實體：翻新線／工作站、舊品識別、翻新品標示、再銷售／再部署資料"],"tracesE":["Documents: refurbishment SOPs, grading criteria, standard replacement-part lists, test specifications and refurbished-product warranties","Records and data: incoming inspections, replacement BOMs, refurbishment work orders, test reports, quantities and destinations","Systems or physical evidence: refurbishment lines or stations, used-product identification, refurbished labels and resale or redeployment data"],"nonZ":["日常保養或單一故障維修","只清潔外觀、重新包裝","拆件後只回收材料","全面重建至新品水準並提供完整新品保固，較接近#11"],"nonE":["Routine servicing or repair of one fault","Cleaning and repackaging only","Dismantling solely for material recovery","Full rebuilding to new-product condition with a complete new-product warranty, which is closer to Action 11"],"defZ":"翻新是在產品預期使用壽命內，將其恢復至可繼續用於相同目的，且品質與性能至少相近的可用狀態。翻新可包含修理、返工、耗損零件更換及軟硬體更新，但不包含重大性能變更或預期壽命結束後的復原。","defE":"Refurbishing is the process of restoring an item, during its expected service life, to a useful condition for the same purpose with at least similar quality and performance. It may include repair, rework, replacement of worn parts and software or hardware updates, but excludes significant performance changes and restoration after the expected service life."},{"id":11,"zh":"再製造","en":"Remanufacturing","qz":"貴公司是否以標準化、工業化程序處理使用過的產品或核心零件，使其功能、性能與品質達到或高於新品水準，並提供完整保固？","qe":"Does your company use a standardised industrial process to treat used products or core components so that their function, performance and quality meet or exceed new-product levels, with a full warranty?","pz":"以標準化、工業化程序處理使用過的產品或核心零件，使其功能、性能與品質達到或高於新品水準，並提供完整保固。","pe":"Use a standardised industrial process to treat used products or core components so that their function, performance and quality meet or exceed new-product levels, with a full warranty.","examplesZ":["建立舊品／核心件回收制度","標準化拆解、清洗、檢查、修復、更換與重組","依新品規格進行完整功能、性能與安全測試","以再製品料號、品質證明與完整保固重新上市","符合適用產品法規與責任要求"],"examplesE":["Operate a return system for used products or cores","Standardise disassembly, cleaning, inspection, repair, replacement and reassembly","Conduct complete functional, performance and safety testing against new-product specifications","Place remanufactured products on the market with dedicated identifiers, quality evidence and a full warranty","Meet applicable product regulations and liability requirements"],"tracesZ":["文件／規範：再製造流程、核心件規格、新品等同性標準、法規評估、完整保固","紀錄／數據：核心件追溯、再製BOM、製程路由、測試數據、品質放行、保固紀錄","系統／實體：專用再製線、核心件庫、再製品識別、標準工時與品質系統"],"tracesE":["Documents: remanufacturing processes, core specifications, new-product equivalence standards, regulatory assessments and full warranty terms","Records and data: core traceability, remanufacturing BOMs, process routes, test data, quality release and warranty records","Systems or physical evidence: dedicated remanufacturing lines, core inventories, product identification, standard times and quality systems"],"nonZ":["一般維修、大修或翻新","只更換少數零件、沒有新品等同性要求","拆取舊件作備件","沒有完整保固或法規符合證明"],"nonE":["Ordinary repair, overhaul or refurbishment","Replacing a small number of parts without new-product equivalence requirements","Harvesting used parts as spares","No full warranty or evidence of regulatory conformity"],"defZ":"再製造是透過工業化程序，將已使用、耗損或失效的產品、零組件或零件，恢復至品質與性能如同新品或優於新品的狀態，並形成新的預期使用壽命；其規格、預定用途或法律聲明也可能更新。","defE":"Remanufacturing is an industrial process that returns a used, worn or non-functional product, component or part to a like-new or better-than-new condition in quality and performance, establishing a new expected service life; its specifications, intended uses or legal claims may also be updated."},{"id":12,"zh":"逆向物流","en":"Reverse Logistics","qz":"貴公司是否已有可運作的退回、收集、運輸、分類或儲存安排，能把使用過、淘汰或剩餘的產品／零件帶回再使用、翻新、再製造或回收節點？","qe":"Does your company have workable return, collection, transport, sorting or storage arrangements that bring used, retired or surplus products and components back to reuse, refurbishment, remanufacturing or recycling points?","pz":"建立可運作的退回、收集、運輸、分類或儲存安排，將使用過、淘汰或剩餘的產品與零件帶回再使用、翻新、再製造或回收節點。","pe":"Maintain workable return, collection, transport, sorting or storage arrangements that bring used, retired or surplus products and components back to reuse, refurbishment, remanufacturing or recycling points.","examplesZ":["客戶退回、換購、take-back或到點收集","建立RMA、回收箱、回程物流或定期取回","對退回品進行集運、分類、暫存與分流","使用可重複回收包裝或回運容器","追蹤回流產品、批次、狀態與接收端"],"examplesE":["Customer returns, trade-in, take-back or collection points","RMA processes, collection boxes, backhauling or scheduled collection","Consolidate, sort, store and route returned items","Use returnable packaging or transport containers","Track returned products, batches, status and receiving points"],"tracesZ":["文件／規範：退回條款、回收作業程序、物流合約、RMA規則、包裝回收規範","紀錄／數據：退回單、運輸單、回收量、來源、狀態、接收端與後續用途","系統／實體：退回標籤、回收據點、暫存區、逆物流倉、追蹤系統"],"tracesE":["Documents: return terms, collection procedures, logistics contracts, RMA rules and packaging-return requirements","Records and data: return notes, transport documents, collected quantities, sources, condition, receiving points and subsequent uses","Systems or physical evidence: return labels, collection points, storage areas, reverse-logistics warehouses and tracking systems"],"nonZ":["只有回收承諾或網站口號","只有處理技術，沒有產品回得來的安排","客戶自行丟棄或自行找回收商","偶發性退貨，未形成可運作路徑"],"nonE":["A take-back promise or website claim only","Processing technology without an arrangement that actually brings products back","Customers disposing of products themselves or finding their own recycler","Occasional returns without a workable return route"],"defZ":"逆向物流是管理、收集及移動使用後、在現地已不需要或未售出的產品、零組件或材料，使其進入原有或其他價值鏈或價值網絡，接受能夠保留或回復價值的適當處理。單純把二手產品配送給新客戶，不構成逆向物流。","defE":"Reverse logistics is the management, collection and movement of post-use, locally undesired or unsold products, components or materials into the same or another value chain or value network for appropriate handling that retains or recovers value. Mere delivery of a used product to a new customer does not constitute reverse logistics."},{"id":13,"zh":"資源層級利用","en":"Cascading of Resources","qz":"貴公司是否為同一項產品、零件或材料安排至少兩個依序發生的用途，先保留較高功能或價值，再進入較低階用途，最後才回收或處理？","qe":"Has your company arranged at least two sequential uses for the same product, component or material, retaining higher function or value first, moving to lower-value uses later, and only then recycling or treating it?","pz":"為同一項產品、零件或材料安排至少兩個依序發生的用途，先保留較高功能或價值，再進入較低階用途，最後才回收或處理。","pe":"Arrange at least two sequential uses for the same product, component or material, retaining higher function or value first, moving to lower-value uses later, and only then recycling or treating it.","examplesZ":["整機先再使用，再翻新，再拆取零件，最後材料回收","高規格零件先供原用途，再轉作較低規格用途","包裝／容器多次使用後再材料回收","生質資源先供產品用途，再供其他用途，最後符合條件地回歸生物圈"],"examplesE":["Reuse a complete product, then refurbish it, harvest parts and finally recycle materials","Use a high-grade component for its original purpose before moving it to a lower-specification use","Reuse packaging or containers multiple times before material recycling","Use biological resources for products first, then other uses, before an appropriate return to the biosphere"],"tracesZ":["文件／規範：狀態分級、優先順序、品質門檻、分流決策樹","紀錄／數據：同一序號／批次在各階段的用途、品質變化、轉移數量與最終去向","系統／實體：分級區、不同用途庫存、轉移單、追溯碼、跨用途合約"],"tracesE":["Documents: condition grading, priority rules, quality thresholds and routing decision trees","Records and data: uses, quality changes, transfer quantities and final destinations for the same serial number or batch","Systems or physical evidence: grading areas, inventory for different uses, transfer forms, traceability codes and cross-use contracts"],"nonZ":["單次二手再使用","單次材料回收","沒有順序與品質判斷的任意降級使用","為了能源回收而跳過可行的再使用、翻新或材料循環"],"nonE":["One-off second-hand reuse","One-off material recycling","Unplanned downcycling without sequence or quality decisions","Sending material to energy recovery while viable reuse, refurbishment or material-circulation options remain"],"defZ":"資源階梯式利用是讓同一資源依序進入不同用途或循環，使前一階段的產出成為下一階段的投入；通常從較高價值用途開始，後續數量或品質可能逐步下降，以延長資源使用時間。其最終可能進入能源回復，或在符合條件時安全回到生物圈。","defE":"Cascading of resources is the sequential use of the same resource for different purposes or cycles, with the output of one stage becoming the input to another. It usually begins with a higher-value use and can involve declining quantity or quality in subsequent stages, extending resource use before final energy recovery or, where appropriate, safe return to the biosphere."},{"id":14,"zh":"回收","en":"Recycling","qz":"就本次產品相關的使用後物或廢料而言，貴公司是否自行或透過明確安排，進行物理、化學或生物處理，產出可再次使用的材料或資源，並能掌握輸入、處理、輸出與去向？","qe":"For used items or waste from this product, does your company carry out or explicitly arrange physical, chemical or biological processing that produces materials or resources for further use, with visibility of the inputs, process, outputs and destinations?","pz":"對本產品相關的使用後物或廢料，自行或透過明確安排進行物理、化學或生物處理，產出可再次使用的材料或資源，並掌握輸入、處理、輸出與去向。","pe":"Carry out or explicitly arrange physical, chemical or biological processing of used items or waste from this product, producing materials or resources for further use with visibility of inputs, processing, outputs and destinations.","examplesZ":["拆解、破碎、分選後製成再生原料","熔融金屬、再製塑膠粒、化學解聚或再生溶劑","將符合條件的生物資源製成可用產物","對回收產出品質與能源投入進行評估","將再生輸出供回自身或其他產品使用"],"examplesE":["Dismantle, shred and sort items into recycled feedstock","Melt metals, re-pelletise plastics, depolymerise materials or regenerate solvents","Process qualifying biological resources into usable outputs","Assess the quality and energy inputs of recycled outputs","Feed recycled outputs back into own or other products"],"tracesZ":["文件／規範：回收處理規格、委託合約、輸入／輸出標準、品質驗收","紀錄／數據：投入量、產出量、回收率、品質等級、能耗、輸出買方／用途","系統／實體：回收設備、處理流程、磅單、檢測報告、再生料出貨紀錄"],"tracesE":["Documents: recycling specifications, service contracts, input/output standards and quality acceptance criteria","Records and data: input and output quantities, recycling rates, quality grades, energy use and output buyers or uses","Systems or physical evidence: recycling equipment, process flows, weighbridge tickets, test reports and recycled-material shipment records"],"nonZ":["只有收集、分類或交給清運商","焚化取能，屬#17","沒有可用輸出，只是處置","泛稱『可回收』，卻不知道實際處理與再生用途"],"nonE":["Collection, sorting or transfer to a waste haulier only","Incineration with energy recovery, which is Action 17","Treatment with no usable output","Calling something recyclable without knowing the actual process or destination of recycled output"],"defZ":"回收再生是透過收集、運輸、分類、清潔及再處理等活動，取得可再次用於製程或產品的回復資源。其處理可採機械、物理、化學或生物方法，但不包括產品再使用及能源回復。","defE":"Recycling comprises activities such as collection, transport, sorting, cleaning and reprocessing to obtain recovered resources for use in a process or product. It may involve mechanical, physical, chemical or biological methods, but excludes product reuse and energy recovery."},{"id":15,"zh":"廢棄物管理","en":"Waste Management","qz":"貴公司是否已對本產品相關製程或回收活動產生的廢棄物，建立辨識、分類、儲存、移交、處理與最終處置安排，並能追蹤主要數量或去向？","qe":"Has your company established identification, segregation, storage, transfer, treatment and final-disposal arrangements for waste from this product’s manufacturing or recovery activities, with tracking of major quantities or destinations?","pz":"對本產品相關製程或回收活動產生的廢棄物，建立辨識、分類、儲存、移交、處理與最終處置安排，並追蹤主要數量或去向。","pe":"Establish identification, segregation, storage, transfer, treatment and final-disposal arrangements for waste from this product’s manufacturing or recovery activities, with tracking of major quantities or destinations.","examplesZ":["依一般、可回收、有害或特殊廢棄物分類","設置合規容器、標示、暫存與防污染措施","將可回收物流導向回收，其他廢棄物交合格處理","管理清運、處理與最終去向","定期分析廢棄物量與異常"],"examplesE":["Classify general, recyclable, hazardous and special wastes","Provide compliant containers, labels, temporary storage and pollution-prevention measures","Route recyclable streams to recycling and other waste to qualified treatment","Manage transport, treatment and final destinations","Regularly analyse waste volumes and anomalies"],"tracesZ":["文件／規範：廢棄物清冊、分類SOP、暫存規定、委託處理合約、許可","紀錄／數據：聯單、清運單、磅單、月報、去向、異常與改善紀錄","系統／實體：分類桶、暫存區、危廢倉、標示、廢棄物管理系統"],"tracesE":["Documents: waste inventories, segregation SOPs, storage rules, treatment contracts and permits","Records and data: manifests, transport notes, weighbridge tickets, monthly reports, destinations, incidents and corrective actions","Systems or physical evidence: labelled bins, storage areas, hazardous-waste stores and waste-management systems"],"nonZ":["只有整潔或5S","只說依法處理，卻無法指出主要廢物流與去向","把所有廢棄物混合後清運","只有回收率數字，沒有邊界與處理方式"],"nonE":["Housekeeping or 5S alone","Stating that waste is legally managed without identifying major streams and destinations","Mixing all waste before collection","A recycling-rate figure without a defined boundary or treatment route"],"defZ":"廢棄物管理是在循環轉型期間，對仍然產生的廢棄物進行符合法律及國際規範的管理與處理，以降低對人體健康及環境的負面影響；可回復資源應在可行情況下導入回復程序，其餘則接受適當處理或最終處置。","defE":"Waste management is the lawful and appropriate management and treatment of waste that continues to arise during the transition to a circular economy, with the aim of minimizing adverse impacts on human health and the environment. Recoverable resources should be directed to recovery where feasible, while the remainder is appropriately treated or disposed of."},{"id":16,"zh":"材料回復","en":"Material Recovery","qz":"貴公司是否從廢棄物流中，透過特定程序分離或提取某一種有價值材料，並讓該材料重新進入供應鏈或生產使用？","qe":"Does your company use a specific process to separate or extract a valuable material from a waste stream and return that material to supply-chain or production use?","pz":"從廢棄物流中透過特定程序分離或提取有價值材料，並讓該材料重新進入供應鏈或生產使用。","pe":"Use a specific process to separate or extract valuable material from a waste stream and return it to supply-chain or production use.","examplesZ":["從電子廢棄物提取銅、貴金屬或關鍵材料","從混合廢料分離特定金屬、塑膠、纖維或溶劑","對目標材料進行純化、精煉或品質調整","將回復材料供自身或指定買方再次使用"],"examplesE":["Recover copper, precious metals or critical materials from electronic waste","Separate specific metals, plastics, fibres or solvents from mixed waste","Purify, refine or adjust the quality of a target material","Supply recovered materials for internal use or to a specified buyer"],"tracesZ":["文件／規範：輸入料規格、目標材料、回復技術、品質標準、法規條件","紀錄／數據：材料含量、回復率、純度、產出批次、檢測、使用者／買方","系統／實體：分選／提取設備、分析儀器、回復材料庫存與出貨紀錄"],"tracesE":["Documents: input specifications, target materials, recovery technology, quality standards and regulatory conditions","Records and data: material content, recovery yield, purity, output batches, tests and users or buyers","Systems or physical evidence: sorting or extraction equipment, analytical instruments, recovered-material inventory and shipment records"],"nonZ":["泛稱有回收，但不知道回復哪種材料","只收集或拆解，沒有材料提取輸出","一般廢料出售，無法確認後續材料回復","能源回收或最終處置"],"nonE":["Claiming recycling without identifying the material recovered","Collection or dismantling without a material-extraction output","Selling general scrap without confirming subsequent material recovery","Energy recovery or final disposal"],"defZ":"材料價值回復是重新取得並利用可回復資源，透過再使用、翻新、再製造、回收再生或其他方式，保留、增加或回復其價值。其資源可能來自製造、使用、翻修及回收流程，也可能來自廢棄物、掩埋場或閒置的人為存量。","defE":"Material recovery is the recapture and reutilization of recoverable resources through reuse, refurbishing, remanufacturing, recycling or other methods that retain, add or recover resource value. The resources may arise from manufacturing, use, refurbishment and recovery processes, or from waste, landfills and dormant anthropogenic stocks."},{"id":17,"zh":"能源回收","en":"Energy Recovery","qz":"對於已確認無法再使用、翻新、再製造或材料回收的剩餘物，貴公司是否安排將其轉為實際被利用的熱能、電力或其他能源？","qe":"For residual material confirmed as unsuitable for reuse, refurbishment, remanufacturing or material recovery, does your company arrange conversion into heat, electricity or another form of energy that is actually used?","pz":"對已確認無法再使用、翻新、再製造或材料回收的剩餘物，安排轉換為實際被利用的熱能、電力或其他能源。","pe":"Convert residual material confirmed as unsuitable for reuse, refurbishment, remanufacturing or material recovery into heat, electricity or another form of energy that is actually used.","examplesZ":["將不可再循環殘餘物送入具能源利用的焚化設施","製成RDF／SRF並供能源設施使用","以厭氧消化產生並利用沼氣","透過特定轉換技術產生可用燃料、熱或電力","記錄為何較高價值路徑不可行"],"examplesE":["Send non-recyclable residues to an incineration facility with energy utilisation","Produce RDF or SRF for use in an energy facility","Generate and use biogas through anaerobic digestion","Use a defined conversion technology to produce usable fuel, heat or electricity","Document why higher-value pathways are not feasible"],"tracesZ":["文件／規範：廢棄物階層評估、熱值與適用性、處理合約、設施能源利用證明","紀錄／數據：投入量、轉換效率、熱／電產出、實際使用端、餘渣去向","系統／實體：能源回收設施資料、計量表、能源憑證、處理報告"],"tracesE":["Documents: waste-hierarchy assessments, calorific-value and suitability reviews, treatment contracts and evidence of energy use","Records and data: inputs, conversion efficiency, heat or electricity output, actual users and residue destinations","Systems or physical evidence: energy-recovery facility data, meters, energy certificates and treatment reports"],"nonZ":["一般焚化但沒有能源利用資料","可回收材料直接焚化","以能源回收合理化可避免廢棄物","只有處理商名稱，不知道技術與能源去向"],"nonE":["Ordinary incineration without energy-use data","Direct incineration of recyclable materials","Using energy recovery to justify avoidable waste","Knowing only the treatment company, not the technology or energy destination"],"defZ":"能源回復是在資源已無法繼續於循環經濟中流動時，透過直接且受控制的轉換產生可用熱能或電力的生命週期末行動。只有在已考量材料保值、材料回復及生命週期權衡，所得能源能替代不可再生能源，且殘餘物受到適當管理時，才可視為循環經濟行動。","defE":"Energy recovery is an end-of-life action that generates useful heat or electricity through the direct and controlled transformation of a resource that can no longer circulate in the circular economy. It qualifies as circular only where material-retention and recovery options and life-cycle trade-offs have been considered, the energy usefully displaces non-renewable alternatives, and residuals are appropriately managed."},{"id":18,"zh":"生態系統再生","en":"Regenerate Ecosystems","qz":"貴公司的產品、材料來源或營運是否與某一個已退化的土壤、水域、棲地或其他自然系統有關，且貴公司已採取措施使其生態功能相較基準狀態獲得恢復？","qe":"Are this product, its material sources or your operations linked to a degraded soil, water body, habitat or other natural system, and has your company taken action that restores its ecological functions against a defined baseline?","pz":"針對與本產品、材料來源或營運相關的退化土壤、水域、棲地或其他自然系統，採取相較基準狀態可恢復其生態功能的措施。","pe":"Take action to restore the ecological functions of a degraded soil, water body, habitat or other natural system linked to the product, its material sources or operations, against a defined baseline.","examplesZ":["修復受污染或退化土壤、水體與棲地","恢復生物多樣性、自然資源供應或水文功能","在原料產地導入具基準與監測的再生農林管理","建立長期生態功能與韌性改善計畫"],"examplesE":["Restore contaminated or degraded soil, water bodies and habitats","Restore biodiversity, natural-resource supply or hydrological functions","Apply monitored regenerative agriculture or forestry at material-source locations","Maintain a long-term plan for improving ecological function and resilience"],"tracesZ":["文件／規範：基準生態調查、修復計畫、土地／水域管理方案、供應來源要求","紀錄／數據：土壤、水質、生物多樣性、覆蓋度、自然資源供應或韌性指標","系統／實體：現地監測、GIS、第三方生態評估、長期維護紀錄"],"tracesE":["Documents: baseline ecological assessments, restoration plans, land or water-management plans and sourcing requirements","Records and data: soil, water quality, biodiversity, ground cover, natural-resource supply or resilience indicators","Systems or physical evidence: field monitoring, GIS, third-party ecological assessments and long-term maintenance records"],"nonZ":["一般減排、節水、植樹或法規合規","沒有基準狀態與功能改善的公益活動","只避免新增破壞，沒有修復既有退化","購買碳抵換而未恢復特定生態系統"],"nonE":["General emissions reduction, water saving, tree planting or legal compliance","A community project without a baseline and ecological-function improvement","Avoiding further damage without restoring existing degradation","Purchasing carbon offsets without restoring a specific ecosystem"],"defZ":"生態系統再生是改善或恢復退化生態系統的行動，包括移除有害物質、修復土壤與水體、保護生物多樣性、因應氣候變遷，以及採行再生農業、復育型水產養殖或造林等生產方式，以促進自然資源及生態系統服務持續更新。","defE":"Ecosystem regeneration comprises actions that improve or restore degraded ecosystems, including removing harmful substances, remediating soil and water bodies, protecting biodiversity, addressing climate change, and applying regenerative production practices such as regenerative agriculture, restorative aquaculture and reforestation to support the continued renewal of natural resources and ecosystem services."},{"id":19,"zh":"教育與研究","en":"Education and Research","qz":"貴公司是否已針對循環經濟，實施明確的教育、專業培訓或研究，使員工具備新的循環能力，或產生可用於循環轉型的新知與方法？","qe":"Has your company provided defined circular-economy education, professional training or research that builds new circular capabilities or generates knowledge and methods that can be used in circular transition?","pz":"針對循環經濟實施明確的教育、專業培訓或研究，使員工具備新的循環能力，或產生可用於循環轉型的新知與方法。","pe":"Provide defined circular-economy education, professional training or research that builds new circular capabilities or generates knowledge and methods for circular transition.","examplesZ":["循環設計、維修、翻新、再製造或回收技能培訓","材料循環、生命週期、責任消費或資源使用教育","開展再使用、替代材料、回收技術或循環商模研究","與學校／研究機構共同發展教材、方法或試驗"],"examplesE":["Training in circular design, repair, refurbishment, remanufacturing or recycling skills","Education on material circulation, life cycles, responsible consumption or resource use","Research on reuse, substitute materials, recycling technology or circular business models","Develop training materials, methods or trials with universities or research institutes"],"tracesZ":["文件／規範：課程大綱、研究計畫、年度培訓計畫、合作研究合約","紀錄／數據：教材、出席、能力測驗、研究報告、論文、專利、試驗與採用結果","系統／實體：學習平台、研究資料庫、實驗場域、示範專案"],"tracesE":["Documents: course outlines, research plans, annual training plans and collaborative research agreements","Records and data: materials, attendance, competence tests, research reports, papers, patents, trials and adoption results","Systems or physical evidence: learning platforms, research databases, test sites and demonstration projects"],"nonZ":["一般安全、品質、操作或法規訓練","一般產品研發，未連結線性轉循環問題","只舉辦宣導活動，沒有明確學習／研究產出","只使用『永續』名稱，內容沒有循環知識或技能"],"nonE":["General safety, quality, operating or regulatory training","General product R&D with no link to the shift from linear to circular systems","Awareness events without defined learning or research outputs","Using a sustainability label when the content contains no circular knowledge or skills"],"defZ":"教育與研究是發展及傳播循環經濟所需的知識、思維、技能、專業能力與研究成果，使組織、使用者及其他利害關係人能理解並實施循環經濟，促進負責任的使用與消費，並為創新奠定基礎。","defE":"Education and research develop and disseminate the knowledge, mindsets, skills, professional capabilities and research needed for organizations, users and other interested parties to understand and implement a circular economy, support responsible use and consumption, and provide a foundation for innovation."},{"id":20,"zh":"創新","en":"Innovation","qz":"貴公司是否為了解決一個明確的資源、延壽、回流或價值回復問題，開發、測試或導入相較既有做法有實質新變化的技術、產品、制度或商業模式？","qe":"To address a defined resource, life-extension, return-flow or value-recovery problem, has your company developed, tested or introduced a technology, product, system or business model with a substantive change from current practice?","pz":"為解決明確的資源、延壽、回流或價值回復問題，開發、測試或導入相較既有做法有實質新變化的技術、產品、制度或商業模式。","pe":"Develop, test or introduce a technology, product, system or business model with a substantive change from current practice to address a defined resource, life-extension, return-flow or value-recovery problem.","examplesZ":["開發新的模組化、可修理或可拆解產品方案","測試新的替代材料、回收或材料回復技術","建立新的回收、翻新、再使用或產品服務模式","導入跨域資料或社會方案突破既有限制","以試點驗證技術與商業可行性"],"examplesE":["Develop a new modular, repairable or easy-to-disassemble product solution","Test new substitute materials, recycling or material-recovery technologies","Create new take-back, refurbishment, reuse or product-service models","Use cross-sector data or social approaches to overcome existing constraints","Validate technical and commercial feasibility through pilots"],"tracesZ":["文件／規範：創新專案書、問題定義、技術路線、商業模式設計、試點計畫","紀錄／數據：原型、專利、TRL、測試報告、試點結果、商業案例、採用數據","系統／實體：示範線、原型、測試平台、新流程或新合約"],"tracesE":["Documents: innovation project briefs, problem definitions, technology roadmaps, business-model designs and pilot plans","Records and data: prototypes, patents, TRLs, test reports, pilot results, business cases and adoption data","Systems or physical evidence: demonstration lines, prototypes, test platforms, new processes or contracts"],"nonZ":["單純購買現成工具","一般持續改善或功能升級","新技術與循環問題無關","只有創意提案，未開發、測試或導入"],"nonE":["Simply purchasing an off-the-shelf tool","Routine continuous improvement or feature upgrades","A new technology unrelated to a circularity problem","An idea that has not been developed, tested or introduced"],"defZ":"創新是透過技術、組織與價值創造模式、制度或社會層面的新作法，改變產品、流程、系統或行為，以促成循環資源流及循環經濟轉型；其發展通常需要資源流分析及跨組織知識移轉。","defE":"Innovation uses new technological, organizational and value-creation-model, institutional or social approaches to change products, processes, systems or behaviour and enable circular resource flows and the transition to a circular economy. Its development commonly relies on resource-flow analysis and knowledge transfer across organizations."},{"id":21,"zh":"協作與網絡","en":"Collaboration and Networks","qz":"貴公司是否與其他部門或外部組織，為一個明確的循環目標建立持續合作，分配角色、共享資料或資源，並共同執行實際行動？","qe":"Has your company established ongoing cooperation with other departments or external organisations for a defined circular objective, assigning roles, sharing data or resources and jointly carrying out practical actions?","pz":"為明確的循環目標，與其他部門或外部組織建立持續合作，分配角色、共享資料或資源，並共同執行實際行動。","pe":"Establish ongoing cooperation with other departments or external organisations for a defined circular objective, assigning roles, sharing data or resources and jointly carrying out practical actions.","examplesZ":["與供應商共同開發循環材料或可修理零件","與客戶建立產品回收、再使用或資料交換","與物流、維修、翻新、回收商建構閉環流程","跨部門共同管理設計、採購、服務與回流","設定共同KPI、治理與決策機制"],"examplesE":["Co-develop circular materials or repairable parts with suppliers","Work with customers on product take-back, reuse or data exchange","Build closed-loop processes with logistics, repair, refurbishment and recycling partners","Manage design, procurement, service and return flows across departments","Set shared KPIs, governance and decision-making mechanisms"],"tracesZ":["文件／規範：合作協議、MOU、治理章程、RACI、共同目標與KPI","紀錄／數據：定期會議、共享資料、聯合專案、共同產出、回收／再使用量","系統／實體：跨組織平台、資料交換介面、共同流程與服務網絡"],"tracesE":["Documents: cooperation agreements, MOUs, governance charters, RACI matrices, shared objectives and KPIs","Records and data: recurring meetings, shared data, joint projects, joint outputs and take-back or reuse quantities","Systems or physical evidence: cross-organisation platforms, data-exchange interfaces, shared processes and service networks"],"nonZ":["一次性會議、交流或參訪","產業協會會員資格","一般供應商交易或客戶關係","只有意向，沒有聯合行動、角色與持續機制"],"nonE":["A one-off meeting, exchange or site visit","Membership in an industry association","Ordinary supplier transactions or customer relationships","Intent without joint action, assigned roles or an ongoing mechanism"],"defZ":"協作與網絡是透過組織內部及組織間的夥伴關係、正式或非正式網絡及多方利害關係人倡議，進行聯合行動、知識交流與價值共享，以設計循環系統、改善循環績效並加速轉型。","defE":"Collaboration and networks use partnerships within and between organizations, formal or informal networks, and multi-stakeholder initiatives to enable joint action, knowledge exchange and value sharing, supporting the design of circular systems, improved circularity performance and a faster transition."},{"id":22,"zh":"協助使用者改變行為","en":"Helping Users Change Their Behaviour","qz":"貴公司是否針對一項明確的使用者行為，例如減量、正確使用、維修、共享、歸還或回收，提供容易採用的替代方案或介入，並觀察使用者是否真的改變行為？","qe":"For a defined user behaviour—such as reduction, correct use, repair, sharing, return or recycling—does your company provide an easy-to-adopt alternative or intervention and observe whether users actually change their behaviour?","pz":"針對減量、正確使用、維修、共享、歸還或回收等明確使用者行為，提供容易採用的替代方案或介入，並觀察使用者是否實際改變行為。","pe":"Provide an easy-to-adopt alternative or intervention for a defined user behaviour—such as reduction, correct use, repair, sharing, return or recycling—and observe whether users actually change their behaviour.","examplesZ":["在產品介面提示適當用量、裝載、維護或節能操作","透過押金、回購、獎勵或預設選項促進歸還與回收","提供容易取得的維修、補充、共享或回收服務","使用數位工具降低參與與選擇障礙","以行為資料持續調整介入"],"examplesE":["Use product interfaces to prompt proper dosage, loading, maintenance or energy-efficient operation","Use deposits, buy-back, rewards or defaults to encourage return and recycling","Provide accessible repair, refill, sharing or collection services","Use digital tools to reduce participation and choice barriers","Continuously adjust interventions using behavioural data"],"tracesZ":["文件／規範：行為目標、使用者旅程、介入設計、獎勵／回收規則","紀錄／數據：實際選擇、使用、維修、共享、退回、回收率或A/B測試","系統／實體：產品介面、APP、回收點、提示、預設選項、獎勵機制"],"tracesE":["Documents: behavioural objectives, user journeys, intervention designs and reward or return rules","Records and data: actual choices, use, repair, sharing, returns, recycling rates or A/B tests","Systems or physical evidence: product interfaces, apps, collection points, prompts, defaults and reward mechanisms"],"nonZ":["只提供一般資訊或宣傳","只調查態度、滿意度或意願","沒有可執行替代方案","行銷活動與循環行為無關"],"nonE":["General information or promotion only","Surveying attitudes, satisfaction or intention only","No actionable alternative available to the user","Marketing activity unrelated to circular behaviour"],"defZ":"協助使用者改變行為，是透過可及的替代方案、透明資訊、數位工具及社會創新，促使使用者在購買、取得產品功能、使用密集度、維護、修理、再使用、交回及處置等階段作出更循環的決策。","defE":"Helping users change their behaviour means using accessible alternatives, transparent information, digital tools and social innovation to enable more circular decisions across purchasing, access to product functions, use intensity, maintenance, repair, reuse, take-back and disposal."},{"id":23,"zh":"政策與法律體系","en":"Policy and Legal System","qz":"貴公司或所屬組織是否具有正式治理權限，並已制定、實施或修訂適用於特定對象的循環政策、規則、義務、誘因、產品責任或公共採購制度？","qe":"Does your company or organisation hold formal governance authority and has it established, implemented or revised circular policies, rules, obligations, incentives, product-responsibility requirements or public-procurement systems for defined parties?","pz":"由具有正式治理權限的組織，制定、實施或修訂適用於特定對象的循環政策、規則、義務、誘因、產品責任或公共採購制度。","pe":"Use formal governance authority to establish, implement or revise circular policies, rules, obligations, incentives, product-responsibility requirements or public-procurement systems for defined parties.","examplesZ":["主管機關制定回收、再生料、耐久、維修或產品責任要求","公共機構設定循環採購規則與強制條件","具治理權限的平台、園區或產業制度建立共同義務與執行機制","設定誘因、費率、責任或執法安排"],"examplesE":["A public authority sets requirements for take-back, recycled content, durability, repair or product responsibility","A public body establishes mandatory circular-procurement rules","An authorised platform, industrial park or sector system sets shared obligations and enforcement mechanisms","Set incentives, fees, responsibilities or enforcement arrangements"],"tracesZ":["文件／規範：法律、命令、公告、正式政策、採購規則、治理決議","紀錄／數據：適用對象、要求／誘因、執行程序、稽核、處分或成效追蹤","系統／實體：申報、許可、費率、查核或制度管理系統"],"tracesE":["Documents: laws, orders, notices, formal policies, procurement rules and governance decisions","Records and data: covered parties, requirements or incentives, implementation procedures, audits, penalties and performance tracking","Systems or physical evidence: reporting, permitting, fee, inspection or scheme-management systems"],"nonZ":["製造商只是遵守法規","企業內部一般政策","政策倡議、白皮書或研究建議尚未被採納","參與公聽會或協會意見交換"],"nonE":["A manufacturer merely complying with regulation","An ordinary internal company policy","A policy proposal, white paper or research recommendation that has not been adopted","Participation in consultations or association discussions"],"defZ":"政策與法律體系行動，是建立或修正目標、誘因、限制、責任分工、公共採購及產品責任規則，包括標示、回收取回、價值回復及財務責任，以支持循環轉型並保護人體健康與環境。","defE":"Policy and legal system actions establish or revise goals, incentives, limits, assigned responsibilities, public-procurement rules and product-responsibility requirements, including labelling, take-back, recovery and financing obligations, to support the circular transition and protect human health and the environment."},{"id":24,"zh":"金融服務","en":"Financial Services","qz":"貴公司、金融合作方或資金提供者是否把明確的循環條件納入投資、授信、保險或資金配置，且該條件實際影響資金是否提供、金額、價格或風險管理？","qe":"Has your company, financial partner or funding provider included explicit circularity conditions in investment, lending, insurance or capital allocation, with those conditions affecting whether funding is provided, its amount or price, or risk management?","pz":"將明確的循環條件納入投資、授信、保險或資金配置，且該條件實際影響資金是否提供、金額、價格或風險管理。","pe":"Include explicit circularity conditions in investment, lending, insurance or capital allocation, with those conditions affecting whether funding is provided, its amount or price, or risk management.","examplesZ":["以可維修性、回收、再生料或產品服務模式作為融資條件","提供支持回收、翻新、再製造或資產服務模式的專案融資","在投資或保險模型中納入剩餘價值、回流率或循環績效","依循環成果調整利率、保費、額度或契約條件"],"examplesE":["Use repairability, take-back, recycled content or product-service models as financing conditions","Provide project finance for recovery, refurbishment, remanufacturing or asset-service models","Include residual value, return rates or circular performance in investment or insurance models","Adjust interest rates, premiums, limits or contract terms according to circular outcomes"],"tracesZ":["文件／規範：授信／投資政策、term sheet、保險條款、風險模型、資金用途規定","紀錄／數據：循環判準評分、資金金額、利率／保費差異、監測指標、資金使用報告","系統／實體：授信審查、投資委員會文件、ESG／CE資料欄位、績效監測"],"tracesE":["Documents: credit or investment policies, term sheets, insurance terms, risk models and use-of-funds requirements","Records and data: circularity scores, amounts financed, interest or premium differences, monitoring indicators and use-of-funds reports","Systems or physical evidence: credit reviews, investment-committee papers, ESG/CE data fields and performance monitoring"],"nonZ":["一般企業貸款、分期付款或設備租賃","只冠以綠色名稱，沒有循環判準","資金用途與循環行動無關","融資條件沒有因循環性而改變"],"nonE":["Ordinary corporate loans, instalment payments or equipment leasing","A green label without circularity criteria","Funding unrelated to circular actions","Financing terms that do not change because of circularity"],"defZ":"金融服務行動是運用融資、投資、保險、風險評估及永續活動分類，為循環價值創造模式、技術、基礎設施及營運提供資金並降低風險，同時採取長期及生命週期觀點配置資本。","defE":"Financial-services actions use financing, investment, insurance, risk assessment and sustainable-activity classification to fund and de-risk circular value creation models, technologies, infrastructure and operations, while allocating capital from a long-term and life-cycle perspective."},{"id":25,"zh":"數位化","en":"Digitalization","qz":"貴公司是否使用產品識別、感測、資料平台或資料交換等數位技術，實際支援本產品的維修、資源管理、回收、再使用、翻新或生命週期決策？","qe":"Does your company use product identification, sensors, data platforms or data exchange to directly support this product’s maintenance, resource management, take-back, reuse, refurbishment or life-cycle decisions?","pz":"使用產品識別、感測、資料平台或資料交換等數位技術，實際支援本產品的維修、資源管理、回收、再使用、翻新或生命週期決策。","pe":"Use product identification, sensors, data platforms or data exchange to directly support this product’s maintenance, resource management, take-back, reuse, refurbishment or life-cycle decisions.","examplesZ":["以序號、QR／RFID或數位護照識別產品與零件","透過IoT與故障資料支援維護與延壽","記錄材料成分、維修歷史、所有權、位置與狀態","以平台管理退回、分級、再使用、翻新與回收","與供應商、客戶或回收商交換循環資料"],"examplesE":["Identify products and parts with serial numbers, QR/RFID or a digital product passport","Use IoT and fault data to support maintenance and life extension","Record material composition, repair history, ownership, location and condition","Use platforms to manage return, grading, reuse, refurbishment and recycling","Exchange circularity data with suppliers, customers or recyclers"],"tracesZ":["文件／規範：資料字典、系統需求、資料治理、介面／交換規格、權限與更新責任","紀錄／數據：序號、感測、故障、維修、材料、位置、退回、處理與決策紀錄","系統／實體：ERP／PLM／MES／IoT、QR／RFID、維修平台、回收平台、API／dashboard"],"tracesE":["Documents: data dictionaries, system requirements, data governance, interface or exchange specifications, access rights and update responsibilities","Records and data: serial, sensor, fault, repair, material, location, return, treatment and decision records","Systems or physical evidence: ERP/PLM/MES/IoT, QR/RFID, repair platforms, recovery platforms, APIs and dashboards"],"nonZ":["只把紙本改成電子檔","一般ERP、官網、電子郵件或行動支付","數位功能只服務行銷或付款，未改善循環流程","有資料但沒有人用於具體決策"],"nonE":["Converting paper records into electronic files only","General ERP, websites, email or mobile payment","Digital functions used only for marketing or payment without improving circular processes","Data that are collected but not used in a specific decision"],"defZ":"數位化是運用數位技術及透明、即時的文件與資料，在價值鏈中分享資訊、掌握資源流、改善產品設計、流程及回收再生方法，並支援循環價值創造模式、資源追溯與生命週期決策。","defE":"Digitalization is the use of digital technologies and transparent, timely documentation and data to share information across the value chain, understand resource flows, improve product design, processes and recycling methods, and support circular value creation models, resource traceability and life-cycle decision-making."}];

function ceById(n){for(var k=0;k<CE.length;k++)if(CE[k].id===n)return CE[k];return null;}
function helpList(items){return '<ul class="ce-help-list">'+(items||[]).map(function(x){return '<li>'+esc(x)+'</li>';}).join('')+'</ul>';}
function setCeTab(id,idx){S.ceTab[id]=idx;render();}
function isEmail(v){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v||"");}
function updateAdmin(k,el){S.admin[k]=el.type==='checkbox'?el.checked:el.value;}
function reportPayload_(extra){
 var a=S.admin;
 var pt=ptById(S.pt);
 var md=(pt?modesFor(S.pt):[]).find(function(x){return x.mode===S.mode;});
 var p={submissionId:a.submissionId,email:a.email,productName:S.productName||'',company:a.company||'',contactName:a.name||'',jobTitle:a.title||'',taxId:a.tax||'',partner:a.partner||'',followup:!!a.followup,productTypeName:pt?pt.name:'',businessModelName:md?md.name:''};
 for(var k in extra){p[k]=extra[k];}
 return p;
}
function handleSendResult_(res){
 if(res&&res.ok){S.admin.sent=true;S.admin.sendError=false;S.admin.sentOptimistic=!!res.optimistic;}
 else if(res&&/附件|attachment/i.test(res.error||'')&&!S.admin._retriedNoAttachment){
  S.admin._retriedNoAttachment=true;
  S.admin.sentNoAttachment=true;
  postToBackend('sendReport',reportPayload_({})).then(handleSendResult_);
  return;
 }
 else{S.admin.sendError=true;}
 render();
}
function submitReport(){
 if(!isEmail(S.admin.email))return;
 var btn=document.getElementById('sendReportBtn');
 if(btn){btn.disabled=true;btn.innerHTML=bi('寄送中…','Sending…');}
 var el=document.getElementById('resultCapture');
 if(!el||!window.html2canvas||!(window.jspdf&&window.jspdf.jsPDF)){
  postToBackend('sendReport',reportPayload_({})).then(handleSendResult_);
  return;
 }
 var MAX_ATTACH_B64=9000000; // ~6.5MB 二進位，留安全餘裕給 Gmail 附件上限
 window.html2canvas(el,{scale:1.4,backgroundColor:'#ffffff',ignoreElements:function(n){return n.classList&&n.classList.contains('no-print');}}).then(function(canvas){
  var img=canvas.toDataURL('image/jpeg',0.82);
  var pdf=new window.jspdf.jsPDF('p','mm','a4');

var PROGPILL={INSTITUTIONALIZED:['已制度化','Institutionalized','pill-c'],IN_PROGRESS:['執行中','In progress','pill-w'],PLANNED:['規劃中','Planned','pill-w'],INTENDS_TO_PLAN:['預計規劃','Intends to plan','pill-u'],NOT_STARTED:['尚未展開','Not started','pill-u'],PROGRESS_UNCERTAIN:['不確定','Uncertain','pill-u']};
var NAPILL=['不適用','N/A','pill-u'];
function statusPill(rec){
 if(!rec||!rec.role)return '<span class="pill pill-u">'+bi('未作答','Unanswered')+'</span>';
 if(rec.role==='NOT_APPLICABLE')return '<span class="pill '+NAPILL[2]+'">'+bi(NAPILL[0],NAPILL[1])+'</span>';
 if(!rec.progress)return '<span class="pill pill-u">'+bi('進展未作答','Progress unanswered')+'</span>';
 var m=PROGPILL[rec.progress]||['','',''];
 return '<span class="pill '+m[2]+'">'+bi(m[0],m[1])+'</span>';
}
function effStatusKey(rec){
 if(!rec||!rec.role)return null;
 if(rec.role==='NOT_APPLICABLE')return 'NOT_APPLICABLE';
 return rec.progress||null;
}
function groupsForMode(mode){
 var G={PP:[],PS:[],SP:[],SS:[]},seen={PP:{},PS:{},SP:{},SS:{}};
 DATA.actions.forEach(function(a){var hooks=DATA.b[a.id]||{};
   Object.keys(hooks).forEach(function(bd){var cell=(DATA.a[bd]||{})[mode];if(!cell)return;
     var key=(cell.g==='P'?'P':'S')+(hooks[bd]==='P'?'P':'S');
     if(!seen[key][a.id]){seen[key][a.id]=true;G[key].push(a);}});});
 return G;
}
function scResult(){
 var mode=S.mode,modeName=bi(DATA.modeName[mode],DATA.modeName_en[mode]);
 var STATUS_ORDER=PROGRESS_OPTIONS.map(function(o){return o.code;}).concat(['NOT_APPLICABLE']);
 var byS={};STATUS_ORDER.forEach(function(c){byS[c]=[];});
 DATA.actions.forEach(function(a){var k=effStatusKey(S.ce[a.id]);if(k)byS[k].push(bi(a.zh,a.en));});
 var sep=LANG==='en'?', ':'、';
 var stLabel={};PROGRESS_OPTIONS.forEach(function(o){stLabel[o.code]={role:'X',progress:o.code};});stLabel.NOT_APPLICABLE={role:'NOT_APPLICABLE'};

 function card(k){var rows=G[k].map(function(a){return '<div style="display:flex;justify-content:space-between;gap:8px;padding:5px 0;border-top:1px solid #eef1f7"><span style="font-size:13px">'+esc(bi(a.zh,a.en))+'</span>'+statusPill(S.ce[a.id])+'</div>';}).join('')||'<div class="ce-def-note">—</div>';
   return '<div class="card" style="padding:14px 16px"><div style="font-weight:700;color:var(--navy);font-size:13.5px;margin-bottom:4px">'+GM[k]+' <span class="ce-en">('+G[k].length+')</span></div>'+rows+'</div>';}
 var grid='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px">'+card('PP')+card('PS')+card('SP')+card('SS')+'</div>';
 var analysis='<div class="notice">'+bi('這一頁是<b>運算邏輯的驗證輸出</b>，非最終報告（報告版面另做）。分組為「行動—驅動關係」，非成熟度分數。','This page is a <b>logic verification output</b>, not the final report (report layout is separate). Grouping reflects action–driver relationships, not a maturity score.')+'</div>'
  +'<div class="sec"><h3>① '+bi('基本資訊','Summary')+'</h3><ul><li>'+bi('產品：','Product: ')+'<b>'+esc(S.productName)+'</b></li><li>'+bi('產品類型：','Type: ')+esc(bi(ptById(S.pt).name,ptById(S.pt).name_en))+'</li><li>'+bi('診斷模式：','Model: ')+'<b>'+esc(modeName)+'</b></li></ul></div>'
  +'<div class="sec"><h3>② '+bi('循環行動狀態總覽','CE action status overview')+'</h3><ul>'+stBlock+'</ul></div>'
  +'<div class="sec"><h3>③ '+bi('推理分組（該模式全部相關行動 · 依狀態標記）','Reasoning groups (all related actions for this model, tagged by status)')+'</h3><p class="qh">'+bi('依所選模式「'+esc(modeName)+'」，列出所有相關行動並標記您的填答狀態（含缺口全景）。同一行動可因不同 Driver 出現在多組。','For the selected model, all related actions are listed and tagged with your status (a full picture including gaps). An action may appear in several groups via different drivers.')+'</p>'+grid+'</div>';
 var body='<div id="resultCapture">'+analysis+'</div>'
  +reportSection()
  +'<div class="sec no-print"><h3>⑤ '+bi('下載 PDF','Download PDF')+' <span class="pill pill-w">'+bi('測試功能','test')+'</span></h3><p class="qh">'+bi('此為測試功能：點下方按鈕，會將上方分析區塊直接匯出成 PDF 檔（需連網）。正式版將提供正式報告版面。','Test feature: the button exports the analysis section above directly to a PDF file (requires internet). A formal report layout will come later.')+'</p><button class="btn btn-g" id="pdfBtn" onclick="downloadTestPDF()">'+bi('下載 PDF（測試功能）','Download PDF (test)')+'</button></div>';
 var foot='<button class="btn btn-g" onclick="go(\'p6\')">'+bi('← 回填答','← Back to answers')+'</button><div class="right"><button class="btn btn-g" onclick="location.reload()">'+bi('重新開始','Restart')+'</button></div>';
 return shell(3,bi('接收結果','Results'),bi('依所選模式呈現的邏輯輸出與報告接收','Logic output for the selected model, and report delivery'),' ',' ',body,foot,true);
}
