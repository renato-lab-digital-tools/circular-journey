<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Your Circular Journey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#10172b; --navy-2:#1c2740; --navy-tint:#e8ecf3; --navy-line:#2a3450;
  --accent:#1b2cff; --accent-tint:#e6ebfa; --logo-blue:#0055FF;
  --ink:#172033; --muted:#566074; --faint:#8c97ad; --line:#c6d0e2; --panel:#eef2fb; --bg:#eaeef6;
  --warn:#b45309; --warn-text:#8a5a00; --warn-bg:#fdf3e3; --warn-line:#e7c890;
  --undet:#7a857f; --undet-bg:#eef0ee; --undet-line:#cdd4cf;
  --r:12px; --mono:ui-monospace,Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:"Noto Sans TC",-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;line-height:1.6}
a{color:var(--accent);font-weight:600}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* nav */
.nav{position:sticky;top:0;z-index:50;background:var(--navy);color:#fff;border-bottom:1px solid var(--navy-line)}
.nav-in{max-width:1100px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;gap:14px}
.nav-logo{height:26px;width:78px;color:#fff;flex-shrink:0}
.nav-div{width:1px;height:22px;background:var(--navy-line);flex-shrink:0}
.nav-title{font-size:15px;font-weight:700;color:#fff;white-space:nowrap}
.nav-brand{display:flex;align-items:center;gap:14px;cursor:pointer}
.nav-brand:hover .nav-title{color:#c7d3ea}
.nav-spacer{flex:1}
.nav-tag{font-family:var(--mono);font-size:10px;letter-spacing:.12em;font-weight:700;color:#9db4dd;border:1px solid var(--navy-line);border-radius:99px;padding:3px 10px;white-space:nowrap}
.nav-btn{background:transparent;color:#fff;border:1px solid var(--navy-line);border-radius:7px;padding:6px 13px;font-size:12.5px;font-weight:600;font-family:inherit;cursor:pointer}
.nav-btn:hover{background:rgba(255,255,255,.08)}
.nav-btn.on{background:#fff;color:var(--navy);border-color:#fff}

.wrap{max-width:1100px;margin:0 auto;padding:0 24px 70px}
.btn{border-radius:8px;padding:13px 30px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;border:none}
.btn-p{background:var(--navy);color:#fff}.btn-p:hover{background:var(--navy-2)}
.btn-d{background:#b6c7e0;color:#fff;cursor:not-allowed}
.btn-g{background:#fff;color:var(--muted);border:1px solid var(--line);padding:12px 24px;font-size:14px}
.btn-g:hover{border-color:var(--navy);color:var(--navy)}
.chip{border:1.5px solid #b3c3e3;background:#fff;color:var(--ink);border-radius:8px;padding:9px 15px;font-size:13px;display:inline-block;cursor:pointer;font-family:inherit}
.chip:hover{border-color:var(--navy)}
.chip.on{border-color:var(--navy);background:var(--navy-tint);color:var(--navy);font-weight:600;box-shadow:inset 3px 0 0 var(--accent)}
.chip.unk.on{border-color:var(--warn);background:var(--warn-bg);color:var(--warn)}
.pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;display:inline-block}
.pill-c{color:var(--navy);border:1px solid var(--navy);background:var(--navy-tint)}
.pill-w{color:var(--warn-text);border:1px solid var(--warn-line);background:var(--warn-bg)}
.pill-u{color:var(--undet);border:1px solid var(--undet-line);background:var(--undet-bg)}
input[type=text],input[type=email]{width:100%;padding:10px 13px;border:1.5px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit}
input:focus{border-color:var(--navy);outline:none;box-shadow:0 0 0 3px var(--accent-tint)}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:22px 24px}
.notice{font-size:12.5px;color:var(--muted);background:var(--navy-tint);border-left:3px solid var(--navy);border-radius:0 8px 8px 0;padding:12px 15px;line-height:1.7}
.notice.warn{background:var(--warn-bg);border-left-color:var(--warn);color:var(--warn-text)}

/* top stepper */
.stepper{display:flex;align-items:flex-start;justify-content:center;flex-wrap:nowrap;overflow-x:auto;padding:16px 4px 6px;margin-top:8px}
.stepper .node{display:flex;flex-direction:column;align-items:center;gap:5px;width:88px;flex-shrink:0}
.stepper .dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:#fff;border:2px solid var(--line);color:var(--faint)}
.stepper .dot.done{background:var(--navy);border-color:var(--navy);color:#fff}
.stepper .dot.cur{background:var(--navy);border-color:var(--navy);color:#fff;box-shadow:0 0 0 3px var(--accent-tint),0 0 0 4px var(--accent)}
.stepper .lb{font-size:10.5px;text-align:center;color:var(--faint);line-height:1.3}
.stepper .lb.on{color:var(--navy);font-weight:700}
.stepper .bar{height:2px;width:22px;background:var(--line);margin-top:12px;flex-shrink:0}
.stepper .bar.done{background:var(--navy)}

/* flow shell */
.shell{border-radius:var(--r);overflow:hidden;box-shadow:0 2px 12px rgba(16,23,43,.09);border:1px solid var(--navy);margin-top:6px;background:#fff}
.shell-head{padding:16px 22px 4px;background:#fff}
.shell-head .t{font-size:19px;font-weight:800;color:var(--navy)}
.shell-head .s{font-size:12.5px;color:var(--muted);margin-top:2px}
.shell-body{display:grid;grid-template-columns:minmax(210px,300px) 1fr}
.illus{border-right:1px solid var(--line);padding:26px 20px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:14px;background:#fff}
.illus .cap{font-size:12px;color:var(--muted);text-align:center;max-width:230px;line-height:1.6}
.qpanel{background:var(--panel);padding:18px 26px 26px}
.q{padding:16px 0;border-top:1px solid #d9e1f0}
.q:first-child{border-top:none}
.q .qt{font-weight:700;font-size:14.5px;margin:0 0 3px;color:var(--navy)}
.q .qh{color:var(--muted);font-size:11.8px;margin:0 0 10px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.shell-foot{display:flex;gap:12px;justify-content:space-between;align-items:center;padding:16px 22px;background:#fff;border-top:1px solid var(--line);flex-wrap:wrap}
.shell-foot .right{display:flex;gap:12px;flex-wrap:wrap;margin-left:auto}

/* home */
.hero{padding:44px 0 8px}
.badge{display:inline-block;font-size:12px;font-weight:700;color:var(--warn-text);background:var(--warn-bg);border:1px solid var(--warn-line);border-radius:99px;padding:4px 12px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:var(--accent);font-weight:700;margin:16px 0 6px}
.hero h1{font-size:36px;line-height:1.2;margin:0 0 14px;color:var(--navy);font-weight:800;letter-spacing:-.01em}
.hero p.sub{font-size:16px;color:var(--muted);max-width:680px;margin:0;line-height:1.75}
.home-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin:22px 0}
.home-grid .card h4{margin:0 0 6px;font-size:15px;color:var(--navy)}
.home-grid .card p{margin:0;font-size:12.8px;color:var(--muted);line-height:1.7}
.sec{margin:26px 0}
.sec h3{font-size:17px;color:var(--navy);margin:0 0 8px;display:flex;align-items:center;gap:8px}
.sec p{font-size:13.5px;color:var(--ink);line-height:1.8;margin:0 0 8px}
.aud{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px;margin-top:10px}
.aud .it{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px}
.aud .it b{font-size:13px;color:var(--navy)}
.aud .it span{font-size:12px;color:var(--muted);display:block;margin-top:3px;line-height:1.6}
.flowlist{counter-reset:st;display:grid;gap:8px;margin-top:8px}
.flowlist .fl{display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 14px}
.flowlist .fl .no{counter-increment:st;font-family:var(--mono);font-weight:700;color:var(--accent);flex-shrink:0}
.flowlist .fl .no::before{content:counter(st)}
.flowlist .fl b{font-size:13px;color:var(--navy)}
.flowlist .fl span{font-size:12px;color:var(--muted)}

/* CE accordion */
.vflow{display:flex;align-items:flex-start;overflow-x:auto;padding:8px 2px 12px;margin-bottom:8px}
.vflow .vn{display:flex;flex-direction:column;align-items:center;gap:4px;width:76px;flex-shrink:0;cursor:pointer}
.vflow .vd{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;background:#fff;border:2px solid var(--line);color:var(--faint)}
.vflow .vd.done{background:var(--navy);border-color:var(--navy);color:#fff}
.vflow .vd.cur{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-tint)}
.vflow .vl{font-size:9.5px;text-align:center;color:var(--faint);line-height:1.25}
.vflow .vl.on{color:var(--navy);font-weight:700}
.vflow .vbar{height:2px;width:16px;background:var(--line);margin-top:11px;flex-shrink:0}
.vflow .vbar.done{background:var(--navy)}
.phase-h{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff;border:1px solid var(--line);border-radius:10px;cursor:pointer;margin-bottom:8px}
.phase-h .ic{width:26px;height:26px;color:var(--navy);flex-shrink:0}
.phase-h .pt{font-weight:700;font-size:14px;color:var(--navy)}
.phase-h .pc{font-size:11.5px;color:var(--muted)}
.ce-item{background:#fff;border:1px solid var(--line);border-radius:10px;padding:13px 15px;margin-bottom:9px}
.ce-item.tbd{opacity:.8;border-style:dashed}
.ce-top{display:flex;align-items:flex-start;gap:10px}
.ce-num{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--accent);flex-shrink:0;margin-top:2px}
.ce-title{font-weight:700;font-size:14px;color:var(--navy)}
.ce-en{font-size:11px;color:var(--faint)}
.ce-q{font-size:12.5px;color:var(--ink);margin:8px 0 10px;line-height:1.6}
.ce-follow{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)}

/* results */
.report{margin-top:6px}
.rcard{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:20px 22px;margin-bottom:14px}
.rcard h3{margin:0 0 8px;font-size:16px;color:var(--navy)}
.rcard .rk{font-family:var(--mono);font-size:10.5px;color:var(--faint);letter-spacing:.08em;font-weight:700}
.rhero{background:var(--navy);color:#fff;border-radius:var(--r);padding:24px 26px;margin-bottom:14px}
.rhero h2{margin:0 0 8px;font-size:22px}
.rhero p{margin:0;color:#c7d3ea;font-size:13.5px}
.chipset{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.ctx{display:inline-block;font-size:12px;background:rgba(255,255,255,.1);border:1px solid var(--navy-line);border-radius:8px;padding:4px 10px;color:#e7edf7}
.res{padding:10px 13px;border-radius:8px;font-size:12.5px;line-height:1.6;margin-bottom:8px}
.res.ok{background:var(--navy-tint);color:var(--navy);border-left:3px solid var(--accent)}
.res.gap{background:var(--warn-bg);color:var(--warn-text);border-left:3px solid var(--warn)}
.res.und{background:var(--undet-bg);color:var(--undet);border-left:3px solid var(--undet-line)}
.stat-row{display:flex;flex-wrap:wrap;gap:10px;margin:6px 0 4px}
.stat{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 16px;text-align:center;min-width:96px}
.stat b{display:block;font-size:22px;color:var(--navy)}
.stat span{font-size:11px;color:var(--muted)}
.incentive{background:linear-gradient(180deg,#fff,#f4f7ff);border:1px solid var(--navy);border-radius:var(--r);padding:20px 22px;margin-bottom:14px}
.incentive h3{margin:0 0 6px;color:var(--navy);font-size:16px}
.incentive p{margin:0 0 12px;font-size:13px;color:var(--muted);line-height:1.7}
.model-switch{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 14px}

@media(max-width:760px){
  .shell-body{grid-template-columns:1fr}
  .illus{border-right:none;border-bottom:1px solid var(--line);padding:18px}
  .illus svg{width:140px;height:auto}
}
@media(max-width:640px){
  .nav-in{height:56px;gap:10px;padding:0 14px}
  .nav-title{font-size:13px}
  .wrap{padding:0 16px 50px}
  .hero h1{font-size:26px}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* scope band — Step 3 shares Step 5's stage taxonomy (linked by stage number + order, single accent) */
.scope-band{display:flex;flex-wrap:wrap;align-items:stretch;gap:6px}
.scope-cell{flex:1 1 130px;min-width:130px;border:1.5px solid var(--line);background:#fff;border-radius:9px;padding:10px 11px;font-size:12.5px;cursor:pointer;color:var(--ink);display:flex;align-items:center;gap:8px;line-height:1.4}
.scope-cell:hover{border-color:var(--navy)}
.scope-cell.on{border-color:var(--navy);box-shadow:inset 0 0 0 1px var(--navy);font-weight:600;color:var(--navy);background:var(--navy-tint)}
.snum{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--line);font-size:10.5px;font-weight:700;color:var(--faint);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.scope-cell.on .snum,.scope-enable.on .snum,.phase-h.ctrl .snum{background:var(--navy);border-color:var(--navy);color:#fff}
.scope-arrow{align-self:center;color:#c3ccdd;font-size:12px;flex-shrink:0}
.scope-enable{margin-top:8px;border:1.5px dashed var(--navy-line);border-left:4px solid var(--navy);background:var(--navy-tint);border-radius:9px;padding:11px 13px;cursor:pointer;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.scope-enable.on{box-shadow:inset 0 0 0 1px var(--navy)}
.scope-enable b{color:var(--navy);font-size:13px}
.scope-en-note{font-size:11.5px;color:var(--muted)}
.ctrl-tag{font-size:10.5px;font-weight:700;color:#fff;background:var(--navy);border-radius:99px;padding:2px 8px;margin-left:auto;white-space:nowrap}
.stg-ic{width:22px;height:22px;flex-shrink:0}
.scope-cell .stg-ic{color:var(--faint)}
.scope-cell.on .stg-ic{color:var(--navy)}
.scope-enable .stg-ic{color:var(--navy)}
.phase-h .ph-ic{display:inline-flex;color:var(--navy);flex-shrink:0}
.consent-line{display:flex;gap:9px;align-items:flex-start;margin-top:14px;max-width:440px;font-size:12.8px;color:var(--ink);line-height:1.5;cursor:pointer}
.consent-line input{margin-top:2px;width:16px;height:16px;flex-shrink:0;accent-color:var(--navy);cursor:pointer}
.anon-note{display:flex;align-items:center;gap:10px;margin:2px 0 22px;padding:11px 16px;border:1px solid var(--line);border-radius:12px;background:#fff;font-size:12.8px;color:var(--muted);line-height:1.55}
.anon-note .lk{width:26px;height:26px;border-radius:8px;background:var(--navy-tint);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.anon-note .lk svg{width:14px;height:14px;color:var(--navy)}
.anon-note b{color:var(--navy);font-weight:600}
</style>
</head>

<header class="nav"><div class="nav-in" id="nav"></div></header>

<script>
/* ===== i18n ===== */
var LANG="zh";
function bi(zh,en){ return LANG==="zh"?zh:en; }
function setLang(l){ LANG=l; render(); }

/* ===== option data ===== */
var FOCUS=[
 {v:"display",zh:"電子顯示器",en:"Electronic displays"},
 {v:"evcharger",zh:"電動車充電器",en:"EV chargers"},
 {v:"laundry",zh:"商用洗衣・洗碗",en:"Commercial laundry / dishwashing"},

 {v:"phone",zh:"手機及平板電腦",en:"Phones & tablets"},
 {v:"furniture",zh:"辦公家具（可選）",en:"Office furniture (optional)"}

var ROLES=[
 {v:"brand",zh:"最終產品與品牌／市場責任掌握者",en:"Final product & brand / market owner"},
 {v:"maker",zh:"最終產品製造商（非品牌商）",en:"Final product manufacturer (non-brand)"},
 {v:"component",zh:"中間財／零組件／模組供應商",en:"Intermediate / component / module supplier"},
 {v:"other",zh:"其他製造或供應角色",en:"Other manufacturing or supply role"}
];
/* SCOPES share the SAME keys/labels/icons as PHASES (Step 5) so the two read as one taxonomy.
   Linear value-chain: design→sourcing→manufacture→logistics→sales→use→eol, plus cross-cutting enabling. */
var SCOPES=[
 {v:"design",zh:"產品設計",en:"Product design"},
 {v:"sourcing",zh:"原料採購",en:"Sourcing"},
 {v:"manufacture",zh:"生產製造",en:"Manufacturing"},
 {v:"logistics",zh:"物流",en:"Logistics"},
 {v:"sales",zh:"銷售",en:"Sales"},
 {v:"use",zh:"產品使用",en:"Product use"},
 {v:"eol",zh:"生命週期結束",en:"End of life"},
 {v:"enabling",zh:"跨階段賦能",en:"Enabling"},
 {v:"unsure",zh:"尚不確定",en:"Not yet clear"}
];
/* One line-style icon per stage, shared by Step 3 chips and Step 5 phase headers. 24x24, stroke=currentColor. */
var STAGE_ICONS={
 design:'<path d="M21 7.5 12 3 3 7.5v9L12 21l9-4.5v-9Z"/><path d="m3 7.5 9 4.5 9-4.5M12 21v-9"/>',
 sourcing:'<path d="m12 2.6 9 4.8-9 4.8-9-4.8 9-4.8Z"/><path d="m3 12.2 9 4.8 9-4.8"/><path d="m3 16.9 9 4.8 9-4.8"/>',
 manufacture:'<path d="M3 21V9l5.5 3.5V9L14 12.5V6l6 3v12Z"/><path d="M7 21v-3M12 21v-3M17 21v-3"/>',
 logistics:'<path d="M3 6.5h11v9H3z"/><path d="M14 9.5h3.6L21 13v2.5h-7z"/><circle cx="7" cy="18" r="1.5"/><circle cx="17.5" cy="18" r="1.5"/>',

/* ===== top stepper (steps 2-8 -> nodes 1-7) ===== */
function topStepper(){
 var cur=S.step-2; // 0-based node index
 var h='<div class="stepper">';
 for(var i=0;i<STEP_NODES.length;i++){
   var st=i<cur?"done":(i===cur?"cur":"");
   h+='<div class="node"><div class="dot '+st+'">'+(i<cur?"✓":(i+1))+'</div><div class="lb '+(i===cur?"on":"")+'">'+bi(STEP_NODES[i][0],STEP_NODES[i][1])+'</div></div>';
   if(i<STEP_NODES.length-1) h+='<div class="bar '+(i<cur?"done":"")+'"></div>';
 }
 return h+'</div>';
}

/* ===== chip helpers ===== */
function chip(label,on,onclick,cls){ return '<span class="chip '+(cls||"")+' '+(on?"on":"")+'" onclick="'+onclick+'">'+(on?"✓ ":"")+label+'</span>'; }
function singleChips(list,cur,key){ return list.map(function(o){return chip(bi(o.zh,o.en),cur===o.v,"setP('"+key+"','"+o.v+"')");}).join(""); }
function multiChips(list,arr,key){ return list.map(function(o){return chip(bi(o.zh,o.en),arr.indexOf(o.v)>-1,"toggleP('"+key+"','"+o.v+"')",(o.v==="unsure"||o.v==="none")?"unk":"");}).join(""); }

/* ===== setters ===== */
function setP(k,v){ S.product[k]=v; render(); }
function toggleP(k,v){ var a=S.product[k]; var i=a.indexOf(v); if(i>-1)a.splice(i,1); else a.push(v); render(); }
function setLife(k,v){ S.life[k]=v; render(); }
function toggleJourney(j){ var i=S.journeys.indexOf(j); if(i>-1){S.journeys.splice(i,1); if(j==="B")S.model="";} else S.journeys.push(j); render(); }
function setModel(v){ S.model=v; render(); }
function setCE(id,st){ if(!S.ce[id])S.ce[id]={}; S.ce[id].status=st; render(); }
function setCEtarget(id,v){ if(!S.ce[id])S.ce[id]={}; S.ce[id].target=v; render(); }
function setPhase(i){ S.cePhase=i; render(); }
function setWant(v){ S.contact.want=v; render(); }
function setConsent(k){ S.contact.consent[k]=!S.contact.consent[k]; render(); }
function isEmail(v){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v||""); }

function rptValidate(){
  var b=document.getElementById("rpt-send"); if(b){ var ok=rptOk(); b.disabled=!ok; b.className="btn "+(ok?"btn-p":"btn-d"); }
  var hint=document.getElementById("rpt-hint");
  if(hint){ var v=S.contact.email||""; if(!v){ hint.textContent=bi("我們會把完整 PDF 報告寄到這裡。","We'll email the full PDF report here."); hint.style.color="var(--muted)"; }
    else if(isEmail(v)){ hint.textContent=bi("Email 格式正確 ✓","Email looks valid ✓"); hint.style.color="var(--navy)"; }
    else { hint.textContent=bi("請輸入有效的 Email，例如 name@company.com","Please enter a valid email, e.g. name@company.com"); hint.style.color="var(--warn-text)"; } }
}

function go(n){ S.step=n; window.scrollTo(0,0); render(); }
function next(){ if(S.step<6) go(S.step+1); }
function prev(){ if(S.step>1) go(S.step-1); }

function foot(nextLabel,nextOk){
 var back=S.step>2?'<button class="btn btn-g" onclick="prev()">'+bi("← 上一步","← Back")+'</button>':'<button class="btn btn-g" onclick="go(1)">'+bi("← 回首頁","← Home")+'</button>';

function shell(title,sub,illus,cap,body,nextLabel,nextOk){
 return topStepper()+'<div class="shell"><div class="shell-head"><div class="t">'+title+'</div><div class="s">'+sub+'</div></div>'+
  '<div class="shell-body"><div class="illus">'+illus+'<div class="cap">'+cap+'</div></div><div class="qpanel">'+body+'</div></div>'+
  foot(nextLabel,nextOk)+'</div>';
}
function qBlock(title,hint,body){ return '<div class="q"><div class="qt">'+title+'</div><div class="qh">'+hint+'</div>'+body+'</div>'; }
function otherInput(show,key,ph){ return show?'<input type="text" style="margin-top:8px;max-width:320px" value="'+(S.product[key]||"")+'" oninput="S.product.'+key+'=this.value" placeholder="'+ph+'">':''; }

/* Step 3 scope selector: 6 sequential stages as a value-chain band + cross-cutting Enabling band.
   Uses the same keys/colours as PHASES so it visually mirrors Step 5. */
function scopeSelector(){
 var arr=S.product.scopes;
 var seqKeys=["design","sourcing","manufacture","logistics","sales","use","eol"];
 var seq=seqKeys.map(function(k){return SCOPES.filter(function(s){return s.v===k;})[0];});
 var enab=SCOPES.filter(function(s){return s.v==="enabling";})[0];
 var uns=SCOPES.filter(function(s){return s.v==="unsure";})[0];
 var h='<div class="scope-band">';
 seq.forEach(function(o,i){
   var on=arr.indexOf(o.v)>-1;
   h+='<div class="scope-cell'+(on?" on":"")+'" onclick="toggleP(\'scopes\',\''+o.v+'\')">'+
      stageIcon(o.v,"stg-ic")+'<span>'+bi(o.zh,o.en)+'</span></div>';
   if(i<seq.length-1) h+='<span class="scope-arrow">→</span>';
 });
 h+='</div>';
 var eon=arr.indexOf("enabling")>-1;
 h+='<div class="scope-enable'+(eon?" on":"")+'" onclick="toggleP(\'scopes\',\'enabling\')">'+
    stageIcon("enabling","stg-ic")+'<b>'+bi(enab.zh,enab.en)+'</b>'+
    '<span class="scope-en-note">'+bi("跨越以上所有階段的共通能力（教育、創新、協作、數位、政策、金融…）","Cross-cutting capabilities that span all stages above")+'</span></div>';
 var uon=arr.indexOf("unsure")>-1;
 h+='<div style="margin-top:8px">'+chip(bi(uns.zh,uns.en),uon,"toggleP('scopes','unsure')","unk")+'</div>';
 return h;
}

 if(jB){

     MODELS.map(function(m){return chip(bi(m.zh,m.en),S.model===m.v,"setModel('"+m.v+"')");}).join("")+'</div></div>';
 }
 var ok=S.journeys.length>0&&(!jB||!!S.model);
 return shell(bi("啟程方向","Journeys"),bi("您想先探索哪個方向","Where to start"),svgPath(),
   bi("不同起點沒有高下，只反映您當下最重要的問題。","No starting point is better — it just reflects what matters most now."),
   body,bi("下一步 →","Next →"),ok);
}

function sc6(){
 // priority set
 var priority={};
 if(S.journeys.indexOf("A")>-1) Object.keys(ESPR_MAP).forEach(function(k){priority[k]=1;});
 if(S.journeys.indexOf("B")>-1&&S.model){ var m=MODELS.filter(function(x){return x.v===S.model;})[0]; m.must.concat(m.support).forEach(function(id){priority[id]=1;}); }
 function realIds(ph){ return ph.ids.filter(function(id){return !ceById(id).tbd;}); }
 function phaseAnswered(ph){ var r=realIds(ph); return r.filter(function(id){return S.ce[id]&&S.ce[id].status;}).length; }
 function phaseDone(ph){ var r=realIds(ph); return r.length>0 && phaseAnswered(ph)===r.length; }
 // value-chain flow strip
 var vf='<div class="vflow">';
 PHASES.forEach(function(ph,idx){
   var done=phaseDone(ph), cur=idx===S.cePhase;
   vf+='<div class="vn" onclick="setPhase('+idx+')"><div class="vd '+(done?"done":"")+' '+(cur?"cur":"")+'">'+(done?"✓":(idx+1))+'</div><div class="vl '+(cur?"on":"")+'">'+bi(ph.zh,ph.en)+'</div></div>';
   if(idx<PHASES.length-1) vf+='<div class="vbar '+(done?"done":"")+'"></div>';
 });
 vf+='</div>';

 function renderCE(id){
   var a=ceById(id), r=S.ce[id]||{};
   var isPri=!!priority[id];
   var opts=ANSWERS.map(function(o){return chip(bi(o.zh,o.en),r.status===o.v,"setCE("+id+",'"+o.v+"')");}).join("");
   var follow="";
   if(r.status==="done"){
     var ty=[{v:"yes",zh:"是",en:"Yes"},{v:"no",zh:"否",en:"No"}];
     follow='<div class="ce-follow"><div class="qh">'+bi("是否已設定目標？","Target set?")+'</div><div class="chips">'+
       ty.map(function(o){return chip(bi(o.zh,o.en),r.target===o.v,"setCEtarget("+id+",'"+o.v+"')");}).join("")+'</div>'+
       '<input type="text" style="margin-top:8px" placeholder="'+bi("目標或執行情況說明（選填）","Target or status note (optional)")+'" value="'+(r.note||"")+'" oninput="if(!S.ce['+id+'])S.ce['+id+']={};S.ce['+id+'].note=this.value"></div>';
   }
   if(r.status==="na"&&isPri) follow+='<div class="notice warn" style="margin-top:8px">'+bi("這項與您所選路徑高度相關，建議再確認「不適用」的理由。","This is highly relevant to your chosen path — please reconfirm why it's N/A.")+'</div>';
   return '<div class="ce-item'+(a.tbd?" tbd":"")+'"><div class="ce-top"><span class="ce-num">'+id+'</span><div style="flex:1"><span class="ce-title">'+bi(a.zh,a.en)+'</span> <span class="ce-en">'+(a.tbd?"":a.en)+'</span> '+
     (isPri?'<span class="pill pill-c">'+bi("優先","Priority")+'</span>':'')+(a.tbd?' <span class="pill pill-u">'+bi("整理中","Coming")+'</span>':'')+'</div></div>'+
     '<div class="ce-q">'+bi(a.qz,a.qe)+'</div><div class="chips">'+opts+'</div>'+follow+'</div>';
 }

 var ph=PHASES[S.cePhase];
 var pans=phaseAnswered(ph), ptot=realIds(ph).length;
 var body='<div class="notice" style="margin-bottom:10px">'+bi("我們把 25 項循環行動依「價值鏈階段」分組，一段一段完成即可。","We grouped the 25 circular actions by value-chain stage — complete them stage by stage.")+' <a href="javascript:demoFill()" style="font-size:11px">'+bi("（測試用：一鍵示意填答）","(test: auto-fill)")+'</a></div>';
 body+=vf;
 var controlled=S.product.scopes.indexOf(ph.k)>-1;
 var ctag=controlled?'<span class="ctrl-tag">'+bi("您掌控此階段","You control this")+'</span>':'';
 body+='<div class="phase-h'+(controlled?" ctrl":"")+'"><span class="ph-ic">'+stageIcon(ph.k,"stg-ic")+'</span><div style="flex:1"><div class="pt">'+bi(ph.zh,ph.en)+'</div><div class="pc">'+(ptot>0?bi("已答 "+pans+"/"+ptot,"Answered "+pans+"/"+ptot):bi("跨階段賦能整理中","Enabling actions being finalised"))+'</div></div>'+ctag+'</div>';
 ph.ids.forEach(function(id){ body+=renderCE(id); });
 // within-step advance
 if(S.cePhase<PHASES.length-1) body+='<div style="text-align:right;margin-top:6px"><button class="btn btn-g" onclick="setPhase('+(S.cePhase+1)+')">'+bi("下一階段 →","Next stage →")+'</button></div>';

 var pIds=Object.keys(priority).map(Number);
 var ansP=pIds.filter(function(id){return S.ce[id]&&S.ce[id].status;}).length;
 var ok=pIds.length===0||ansP===pIds.length;
 var remain=pIds.length-ansP;
 var sub=pIds.length?(remain>0?bi("還有 "+remain+" 項優先行動待答",""+remain+" priority action(s) left"):bi("優先行動已完成 ✓","Priority actions complete ✓")):bi("檢視 25 項循環行動","Review your 25 circular actions");
 return shell(bi("檢視您的循環行動","Review your circular actions"),sub,svgDoc(),
   bi("逐項標記現況；已執行可補目標與說明。","Mark each item; if implemented, add a target and note."),
   body,bi("看結果 →","See map →"),ok);
}

/* Report-footer block: the user sees the report first, THEN chooses to leave details for the full PDF. */
function reportContact(){
 var c=S.contact;
 if(c.sent){
   return '<div class="incentive"><h3>'+bi("已送出 ✓","Done ✓")+'</h3><p style="margin:0">'+bi("完整 PDF 報告將寄到您的信箱","The full PDF report is on its way to your inbox")+(c.email?'：<b>'+c.email+'</b>':'')+bi("。",".")+'</p></div>';
 }
 var hasB=S.journeys.indexOf("B")>-1;
 var desc=hasB
   ? bi("這頁的即時結果只顯示您選的一種商業模型。完整 PDF 會把「循環化銷售／延壽服務／使用權」三種模式的必要、使能與選擇性缺口一次列出並附理由，可帶回團隊討論。留下 Email，我們便寄給您。",
        "The instant results here show only your selected business model. The full PDF lays out the must / enabling / optional gaps for all three models side by side, with reasons — ready to take back to your team. Leave your email and we'll send it.")
   : bi("完整 PDF 報告會把您的缺口、依賴與下一步整理成可帶回團隊討論的版本。留下 Email，我們便寄給您。",
        "The full PDF report packages your gaps, dependencies and next steps into a version you can take back to the team. Leave your email and we'll send it.");
 var ok0=rptOk();
 var h='<div class="incentive"><h3>'+bi("想要完整 PDF 報告？","Want the full PDF report?")+'</h3><p>'+desc+'</p>';
 h+='<div style="display:grid;gap:12px;max-width:440px">';
 h+='<div><label class="qh" style="display:block;margin-bottom:4px">'+bi("公司名稱（必填）","Company name (required)")+'</label>'+
    "<input type='text' value='"+(c.company||"")+"' oninput=\"S.contact.company=this.value; rptValidate()\"></div>";
 h+='<div><label class="qh" style="display:block;margin-bottom:4px">'+bi("姓名（必填）","Name (required)")+'</label>'+
    "<input type='text' value='"+(c.name||"")+"' oninput=\"S.contact.name=this.value; rptValidate()\"></div>";
 h+='<div><label class="qh" style="display:block;margin-bottom:4px">'+bi("Email（必填）","Email (required)")+'</label>'+
    "<input type='email' inputmode='email' autocomplete='email' value='"+(c.email||"")+"' oninput=\"S.contact.email=this.value; rptValidate()\" placeholder='name@company.com'>"+
    '<div class="qh" id="rpt-hint" style="margin-top:4px">'+bi("我們會把完整 PDF 報告寄到這裡。","We'll email the full PDF report here.")+'</div></div>';
 h+='<div><label class="qh" style="display:block;margin-bottom:4px">'+bi("統一編號（選填）","Business ID (optional)")+'</label>'+
    "<input type='text' inputmode='numeric' maxlength='20' value='"+(c.tax||"")+"' oninput=\"setTax(this)\" placeholder='"+bi("僅限數字，上限 20 字","Digits only, up to 20")+"'></div>";
 h+='</div>';
 h+='<label class="consent-line"><input type="checkbox" '+(c.consent.report?"checked":"")+' onclick="S.contact.consent.report=this.checked;rptValidate()"><span>'+bi("同意提供上述資料，用於產製並寄送本報告及必要聯繫。","I agree to provide the above information to generate, send this report and make any necessary contact.")+'</span></label>';
 h+='<div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-top:14px">'+
    '<button id="rpt-send" class="btn '+(ok0?"btn-p":"btn-d")+'" '+(ok0?"":"disabled")+' onclick="submitReport()">'+bi("產生並寄送報告 →","Generate & send the report →")+'</button>'+
    '<button class="btn btn-g" onclick="summaryDownload()">'+bi("下載一頁摘要（免留資料）","Download the one-page summary (no details needed)")+'</button></div>';
 return h+'</div>';
}

/* ===== results ===== */
function targetSet(){
 var t={};
 if(S.journeys.indexOf("A")>-1) Object.keys(ESPR_MAP).forEach(function(k){ t[k]=t[k]||{}; t[k].A=ESPR_MAP[k]; });
 var mv=S.resultModel||S.model;
 if(S.journeys.indexOf("B")>-1&&mv){ var m=MODELS.filter(function(x){return x.v===mv;})[0];
   m.must.forEach(function(id){ t[id]=t[id]||{}; t[id].B="must"; });
   m.support.forEach(function(id){ t[id]=t[id]||{}; if(!t[id].B)t[id].B="support"; });
 }
 return t;
}
function sc8(){
 var t=targetSet(), ids=Object.keys(t).map(Number);
 var have=[],gaps=[],nas=[];
 ids.forEach(function(id){ var r=S.ce[id]||{}; if(r.status==="done")have.push(id); else if(r.status==="na")nas.push(id); else gaps.push(id); });
 var done=0,not=0,na=0; CE.forEach(function(a){var r=S.ce[a.id];if(r&&r.status==="done")done++;else if(r&&r.status==="na")na++;else if(r&&r.status==="not")not++;});
 var pName=FOCUS.filter(function(x){return x.v===S.product.focus;})[0];
 var pLabel=pName?bi(pName.zh,pName.en):bi("未選產品","No product");
 var roleO=ROLES.filter(function(x){return x.v===S.product.role;})[0];
 var jLabel=S.journeys.map(function(j){return j==="A"?bi("ESPR 準備","ESPR readiness"):bi("新收益","New revenue");}).join(" ・ ")||"—";

 var h='<div class="report">';
 h+='<div class="notice warn" style="margin-bottom:14px">'+bi("以下為【示意】即時運算，非最終邏輯——ESPR 面向與商業模型矩陣尚未定版。改上一步的作答，這裡會即時變化。",
   "Below is an ILLUSTRATIVE live computation, not final logic — the ESPR aspect and business-model matrices are not yet finalised. Change your answers and this updates live.")+'</div>';
 h+='<div class="rhero"><h2>Your Circular Journey Map</h2><p>'+bi("將您檢視的循環行動，轉化為方向、能力、缺口與下一步。","Turns your circular-action review into direction, capability, gaps and next steps.")+'</p>'+
   '<div class="chipset"><span class="ctx"><b>'+bi("產品","Product")+'：</b>'+pLabel+'</span><span class="ctx"><b>'+bi("角色","Role")+'：</b>'+(roleO?bi(roleO.zh,roleO.en):"—")+'</span><span class="ctx"><b>'+bi("路徑","Path")+'：</b>'+jLabel+'</span></div></div>';
 h+=rc("01",bi("產品與企業位置","Product & company position"),
   '<div class="stat-row"><div class="stat"><b>'+S.product.scopes.length+'</b><span>'+bi("涉及範疇","Scopes")+'</span></div><div class="stat"><b>'+S.product.markets.length+'</b><span>'+bi("銷售市場","Markets")+'</span></div><div class="stat"><b>'+S.journeys.length+'</b><span>'+bi("探索路徑","Paths")+'</span></div></div>'+
   '<div style="font-size:12.5px;color:var(--muted)">'+bi("焦點產品","Focus product")+'：<b>'+pLabel+'</b>'+(S.product.name?'（'+S.product.name+'）':'')+'</div>');
 h+=rc("02",bi("現況起點","Current starting point"),
   '<div class="stat-row"><div class="stat"><b>'+done+'</b><span>'+bi("已執行","Implemented")+'</span></div><div class="stat"><b>'+not+'</b><span>'+bi("未執行","Not yet")+'</span></div><div class="stat"><b>'+na+'</b><span>'+bi("自評不適用","N/A")+'</span></div></div>');
 var haveH=have.length?have.map(function(id){var a=ceById(id);return '<div class="res ok">'+id+". "+bi(a.zh,a.en)+'</div>';}).join(""):'<div class="res und">'+bi("此路徑尚未盤到已執行的目標行動。","No implemented target actions yet for this path.")+'</div>';
 h+=rc("03",bi("已具備能力","Capabilities in place"),haveH);
 var pathH="";
 if(S.journeys.indexOf("B")>-1){
   var mv=S.resultModel||S.model;
   pathH+='<div class="qh">'+bi("即時切換商業模型看缺口變化（示意）：","Switch business model to see gaps change (illustrative):")+'</div><div class="model-switch">'+
     MODELS.map(function(m){return chip(bi(m.zh,m.en),mv===m.v,"S.resultModel='"+m.v+"';render()");}).join("")+'</div>';
   var mm=MODELS.filter(function(x){return x.v===mv;})[0];
   pathH+='<div class="res ok">'+bi(mm.dz,mm.de)+'</div>';
 }
 if(S.journeys.indexOf("A")>-1) pathH+='<div class="res ok">'+bi("ESPR／歐盟市場準備：由產品特性自動推導相關面向，映射分直接支持／使能支持／證據依賴。","ESPR / EU-market readiness: relevant aspects auto-derived from product traits; mapping is direct / enabling / evidence-dependent.")+'</div>';
 h+=rc("04",bi("可能路徑","Possible paths"),pathH||'<div class="res und">'+bi("尚未選擇路徑。","No path selected.")+'</div>');
 var gapH="";
 gaps.forEach(function(id){var a=ceById(id);var must=(t[id].B==="must");gapH+='<div class="res gap">'+(must?'<b>['+bi("必要","Must")+'] </b>':'')+id+". "+bi(a.zh,a.en)+'</div>';});
 nas.forEach(function(id){var a=ceById(id);gapH+='<div class="res und">'+id+". "+bi(a.zh,a.en)+' — '+bi("自評不適用，建議再確認","N/A — please reconfirm")+'</div>';});
 if(!gapH) gapH='<div class="res ok">'+bi("此路徑的目標行動大致已具備。","Target actions for this path are largely in place.")+'</div>';
 h+=rc("05",bi("缺口與依賴","Gaps & dependencies"),gapH+'<div class="qh" style="margin-top:8px">'+bi("含「證據依賴」項者，不能只靠自評，尚需測試／計算／供應商文件。","Evidence-dependent items can't rely on self-assessment alone — they need testing, calculation or supplier documents.")+'</div>');
 h+=rc("06",bi("下一步選項","Next-step options"),
   (gaps.length?'<div class="res ok">'+bi("優先補足","Prioritise")+'：'+gaps.slice(0,3).map(function(id){return bi(ceById(id).zh,ceById(id).en);}).join("、")+'</div>':'<div class="res ok">'+bi("可整理既有強項為對外案例。","Package existing strengths into an external case.")+'</div>')+
   '<div class="notice" style="margin-top:8px">'+bi("若想把方向轉成實作，可了解結構化實施接口 ","To turn direction into implementation, explore the structured route ")+'<a href="https://circular-onsite.com/" target="_blank">Circular On-site</a>'+bi("（非唯一出口、不強制）。","(one option, not the only exit, not mandatory).")+'</div>');
 h+=rc("07",bi("資源與夥伴","Resources & partners"),'<div class="res ok">'+bi("材料/再生料供應商、維修/翻新/再製造業者、逆向物流、回收業者、DPP/資料服務、法規/標準顧問。","Material/recycled-material suppliers, repair/refurbishment/remanufacturing providers, reverse logistics, recyclers, DPP/data services, regulatory/standards advisors.")+'</div>');
 h+=reportContact();
 h+='<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px"><button class="btn btn-g" onclick="prev()">'+bi("← 修改作答","← Edit answers")+'</button><button class="btn btn-g" onclick="replayOther()">↺ '+bi("探索另一條路徑","Explore the other path")+'</button></div>';
 h+='<div class="notice" style="margin-top:14px;font-size:11.5px">'+bi("分析日期 2026-07-15 ・ CE Action 定義 v0.2（1–25）・ ISO 59004:2024／ESPR 參考版本 ・ 本結果為方向性參考，非合規判定或法律意見。",
   "Analysis date 2026-07-15 ・ CE Action definitions v0.2 (1–25) ・ ISO 59004:2024 / ESPR reference versions ・ Directional reference only; not a compliance ruling or legal advice.")+'</div></div>';
 return topStepper()+h;
}
function rc(k,title,body){ return '<div class="rcard"><div class="rk">'+k+'</div><h3>'+title+'</h3>'+body+'</div>'; }

/* ===== main render ===== */
function render(){
 document.documentElement.lang=LANG==="zh"?"zh-Hant":"en";
 renderNav();
 var el=document.getElementById("app"), s=S.step;
 if(s===1)el.innerHTML=scHome();
 else if(s===2)el.innerHTML=sc2();
 else if(s===3)el.innerHTML=sc3();
 else if(s===4)el.innerHTML=sc5();
 else if(s===5)el.innerHTML=sc6();
 else if(s===6)el.innerHTML=sc8();
}
render();
</script>
