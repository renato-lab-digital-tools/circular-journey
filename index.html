<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Design Your Circular Journey — 邏輯原型 v0.7</title>
<style>
:root{
  --navy:#10172b; --navy-2:#1c2740; --navy-tint:#e8ecf3; --navy-line:#2a3450;
  --accent:#1b2cff; --accent-tint:#e6ebfa; --logo-blue:#0055FF;
  --ink:#172033; --muted:#566074; --faint:#8c97ad; --line:#c6d0e2; --panel:#eef2fb; --bg:#eaeef6;
  --warn:#b45309; --warn-text:#8a5a00; --warn-bg:#fdf3e3; --warn-line:#e7c890;
  --undet:#7a857f; --undet-bg:#eef0ee; --undet-line:#cdd4cf;
  --r:12px; --mono:ui-monospace,Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:"Noto Sans TC",-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;line-height:1.6}
a{color:var(--accent);font-weight:600}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* nav */
.nav{position:sticky;top:0;z-index:50;background:var(--navy);color:#fff;border-bottom:1px solid var(--navy-line)}
.nav-in{max-width:1100px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;gap:14px}
.nav-logo{height:26px;width:78px;color:#fff;flex-shrink:0}
.nav-div{width:1px;height:22px;background:var(--navy-line);flex-shrink:0}
.nav-title{font-size:15px;font-weight:700;color:#fff;white-space:nowrap}
.nav-brand{display:flex;align-items:center;gap:14px;cursor:pointer}
.nav-brand:hover .nav-title{color:#c7d3ea}
.nav-spacer{flex:1}
.nav-tag{font-family:var(--mono);font-size:10px;letter-spacing:.12em;font-weight:700;color:#9db4dd;border:1px solid var(--navy-line);border-radius:99px;padding:3px 10px;white-space:nowrap}
.nav-btn{background:transparent;color:#fff;border:1px solid var(--navy-line);border-radius:7px;padding:6px 13px;font-size:12.5px;font-weight:600;font-family:inherit;cursor:pointer}
.nav-btn:hover{background:rgba(255,255,255,.08)}
.nav-btn.on{background:#fff;color:var(--navy);border-color:#fff}

.wrap{max-width:1100px;margin:0 auto;padding:0 24px 70px}
.btn{border-radius:8px;padding:13px 30px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;border:none}
.btn-p{background:var(--navy);color:#fff}.btn-p:hover{background:var(--navy-2)}
.btn-d{background:#b6c7e0;color:#fff;cursor:not-allowed}
.btn-g{background:#fff;color:var(--muted);border:1px solid var(--line);padding:12px 24px;font-size:14px}
.btn-g:hover{border-color:var(--navy);color:var(--navy)}
.chip{border:1.5px solid #b3c3e3;background:#fff;color:var(--ink);border-radius:8px;padding:9px 15px;font-size:13px;display:inline-block;cursor:pointer;font-family:inherit}
.chip:hover{border-color:var(--navy)}
.chip.on{border-color:var(--navy);background:var(--navy-tint);color:var(--navy);font-weight:600;box-shadow:inset 3px 0 0 var(--accent)}
.chip.unk.on{border-color:var(--warn);background:var(--warn-bg);color:var(--warn)}
.pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;display:inline-block}
.pill-c{color:var(--navy);border:1px solid var(--navy);background:var(--navy-tint)}
.pill-w{color:var(--warn-text);border:1px solid var(--warn-line);background:var(--warn-bg)}
.pill-u{color:var(--undet);border:1px solid var(--undet-line);background:var(--undet-bg)}
input[type=text],input[type=email]{width:100%;padding:10px 13px;border:1.5px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit}
input:focus{border-color:var(--navy);outline:none;box-shadow:0 0 0 3px var(--accent-tint)}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:22px 24px}
.notice{font-size:12.5px;color:var(--muted);background:var(--navy-tint);border-left:3px solid var(--navy);border-radius:0 8px 8px 0;padding:12px 15px;line-height:1.7}
.notice.warn{background:var(--warn-bg);border-left-color:var(--warn);color:var(--warn-text)}


.ce-def{font-size:13px;line-height:1.75;color:var(--ink)}
.ce-def-h{font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--accent);margin-bottom:6px}
.ce-def p{margin:0 0 10px}
.ce-def-note{font-size:11px;color:var(--muted);border-top:1px dashed var(--line);padding-top:8px}
/* top stepper */
.stepper{display:flex;align-items:flex-start;justify-content:center;flex-wrap:nowrap;overflow-x:auto;padding:16px 24px 6px;margin:8px -24px 0;position:sticky;top:60px;z-index:40;background:#f4f6fa;box-shadow:0 1px 0 var(--line)}
.stepper .node{display:flex;flex-direction:column;align-items:center;gap:5px;width:88px;flex-shrink:0}
.stepper .dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:#fff;border:2px solid var(--line);color:var(--faint)}
.stepper .dot.done{background:var(--navy);border-color:var(--navy);color:#fff}
.stepper .dot.cur{background:var(--navy);border-color:var(--navy);color:#fff;box-shadow:0 0 0 3px var(--accent-tint),0 0 0 4px var(--accent)}
.stepper .lb{font-size:10.5px;text-align:center;color:var(--faint);line-height:1.3}
.stepper .lb.on{color:var(--navy);font-weight:700}
.stepper .bar{height:2px;width:22px;background:var(--line);margin-top:12px;flex-shrink:0}
.stepper .bar.done{background:var(--navy)}

/* flow shell */
.shell{border-radius:var(--r);overflow:hidden;box-shadow:0 2px 12px rgba(16,23,43,.09);border:1px solid var(--navy);margin-top:6px;background:#fff}
.shell-head{padding:16px 22px 4px;background:#fff}
.shell-head .t{font-size:19px;font-weight:800;color:var(--navy)}
.shell-head .s{font-size:12.5px;color:var(--muted);margin-top:2px}
.shell-head-row{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
.shell-head-right{padding-bottom:2px}
.phase-strip{display:flex;gap:9px;align-items:flex-start;flex-wrap:wrap}
.phase-strip .ps-n{display:flex;flex-direction:column;align-items:center;gap:4px;width:54px;cursor:pointer;flex-shrink:0}
.phase-strip .ps-ic{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;padding:6px;box-sizing:border-box;background:var(--undet-bg);color:var(--faint);flex-shrink:0}
.phase-strip .ps-ic svg,.phase-strip .ps-ic img{width:100%;height:100%;object-fit:contain}
.phase-strip .ps-ic.done{background:var(--navy);color:#fff}
.phase-strip .ps-ic.cur{background:var(--accent-tint);border:2px solid var(--accent);color:var(--accent)}
.phase-strip .ps-l{font-size:9.5px;text-align:center;line-height:1.25;color:var(--faint);white-space:nowrap}
.phase-strip .ps-l.on{color:var(--navy);font-weight:700}
.phase-strip .ps-bar{height:2px;width:9px;background:var(--line);margin-top:16px;flex-shrink:0}
.phase-strip .ps-bar.done{background:var(--navy)}
@media(max-width:900px){.shell-head-right{display:none}}
.shell-body{display:grid;grid-template-columns:minmax(210px,300px) 1fr}
.shell-body.full-width{grid-template-columns:1fr}
.shell-body.full-width .illus{display:none}
.shell-body.full-width .qpanel{padding:18px 30px 28px}
.illus{border-right:1px solid var(--line);padding:26px 20px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:14px;background:#fff}
.illus .cap{font-size:12px;color:var(--muted);text-align:center;max-width:230px;line-height:1.6}
.qpanel{background:var(--panel);padding:18px 26px 26px}
.q{padding:16px 0;border-top:1px solid #d9e1f0}
.q:first-child{border-top:none}
.q .qt{font-weight:700;font-size:14.5px;margin:0 0 3px;color:var(--navy)}
.q .qh{color:var(--muted);font-size:11.8px;margin:0 0 10px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.shell-foot{display:flex;gap:12px;justify-content:space-between;align-items:center;padding:16px 22px;background:#fff;border-top:1px solid var(--line);flex-wrap:wrap}
.shell-foot .right{display:flex;gap:12px;flex-wrap:wrap;margin-left:auto}

/* home */
.hero{padding:44px 0 8px}
.badge{display:inline-block;font-size:12px;font-weight:700;color:var(--warn-text);background:var(--warn-bg);border:1px solid var(--warn-line);border-radius:99px;padding:4px 12px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:var(--accent);font-weight:700;margin:16px 0 6px}
.hero h1{font-size:36px;line-height:1.2;margin:0 0 14px;color:var(--navy);font-weight:800;letter-spacing:-.01em}
.hero p.sub{font-size:16px;color:var(--muted);max-width:680px;margin:0;line-height:1.75}
.home-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin:22px 0}
.home-grid .card h4{margin:0 0 6px;font-size:15px;color:var(--navy)}
.home-grid .card p{margin:0;font-size:12.8px;color:var(--muted);line-height:1.7}
.sec{margin:26px 0}
.sec h3{font-size:17px;color:var(--navy);margin:0 0 8px;display:flex;align-items:center;gap:8px}
.sec p{font-size:13.5px;color:var(--ink);line-height:1.8;margin:0 0 8px}
.aud{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px;margin-top:10px}
.aud .it{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px}
.aud .it b{font-size:13px;color:var(--navy)}
.aud .it span{font-size:12px;color:var(--muted);display:block;margin-top:3px;line-height:1.6}
.flowlist{counter-reset:st;display:grid;gap:8px;margin-top:8px}
.flowlist .fl{display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 14px}
.flowlist .fl .no{counter-increment:st;font-family:var(--mono);font-weight:700;color:var(--accent);flex-shrink:0}
.flowlist .fl .no::before{content:counter(st)}
.flowlist .fl b{font-size:13px;color:var(--navy)}
.flowlist .fl span{font-size:12px;color:var(--muted)}

/* CE accordion */
.vflow{display:flex;align-items:flex-start;overflow-x:auto;padding:8px 2px 12px;margin-bottom:8px}
.vflow .vn{display:flex;flex-direction:column;align-items:center;gap:4px;width:76px;flex-shrink:0;cursor:pointer}
.vflow .vd{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;background:#fff;border:2px solid var(--line);color:var(--faint)}
.vflow .vd.done{background:var(--navy);border-color:var(--navy);color:#fff}
.vflow .vd.cur{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-tint)}
.vflow .vl{font-size:9.5px;text-align:center;color:var(--faint);line-height:1.25}
.vflow .vl.on{color:var(--navy);font-weight:700}
.vflow .vbar{height:2px;width:16px;background:var(--line);margin-top:11px;flex-shrink:0}
.vflow .vbar.done{background:var(--navy)}
.phase-h{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff;border:1px solid var(--line);border-radius:10px;cursor:pointer;margin-bottom:8px}
.phase-h .ph-ic{width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--navy)}
.phase-h .ph-ic svg,.phase-h .ph-ic img{width:100%;height:100%;object-fit:contain}
.phase-h .pt{font-weight:700;font-size:14px;color:var(--navy)}
.phase-h .pc{font-size:11.5px;color:var(--muted)}
.ce-item{background:#fff;border:1px solid var(--line);border-radius:10px;padding:13px 15px;margin-bottom:9px}
.ce-item.tbd{opacity:.8;border-style:dashed}
.ce-top{display:flex;align-items:flex-start;gap:10px}
.ce-num{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--accent);flex-shrink:0;margin-top:2px}
.ce-title{font-weight:700;font-size:14px;color:var(--navy)}
.ce-en{font-size:11px;color:var(--faint)}
.ce-q{font-size:12.5px;color:var(--ink);margin:8px 0 10px;line-height:1.6}
.ce-follow{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)}

.ce-item{padding:16px 17px}
.ce-method-line{display:flex;align-items:center;gap:8px;margin-bottom:10px;color:var(--faint);font-size:10.5px;font-family:var(--mono);font-weight:700;letter-spacing:.04em}
.ce-method-line .ce-num{margin-top:0}
.ce-method-name{font-family:inherit;letter-spacing:0;color:var(--muted);font-weight:600}
.ce-practice{font-size:14px;line-height:1.75;color:var(--navy);font-weight:700;margin:0 0 12px}
.ce-status-prompt{font-size:11.8px;color:var(--muted);font-weight:600;margin:0 0 8px}
.ce-help-tabs{margin-top:13px;border-top:1px dashed var(--line);padding-top:10px}
.ce-tabs{display:flex;gap:3px;margin-bottom:9px;border-bottom:1px solid #e1e6f0;flex-wrap:wrap}
.ce-tabs .ce-tab{font-size:10.8px;font-weight:600;color:var(--faint);padding:6px 10px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;user-select:none;white-space:nowrap}
.ce-tabs .ce-tab.on{font-weight:700;color:var(--navy);border-bottom-color:var(--accent)}
.ce-tabs .ce-tab.on.warn-on{color:var(--warn-text);border-bottom-color:var(--warn)}
.ce-tab-panel{color:#3a4a63;font-size:11.3px;line-height:1.65}
.ce-help-list{margin:0;padding-left:17px;color:var(--muted);font-size:11.4px;line-height:1.65}
.ce-help-list li+li{margin-top:4px}
.ce-tab-panel.warn .ce-help-list{color:var(--warn-text)}
.ce-tab-tbd{color:var(--faint);font-style:italic;padding:4px 0 2px}


/* results */
.report{margin-top:6px}
.rcard{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:20px 22px;margin-bottom:14px}
.rcard h3{margin:0 0 8px;font-size:16px;color:var(--navy)}
.rcard .rk{font-family:var(--mono);font-size:10.5px;color:var(--faint);letter-spacing:.08em;font-weight:700}
.rhero{background:var(--navy);color:#fff;border-radius:var(--r);padding:24px 26px;margin-bottom:14px}
.rhero h2{margin:0 0 8px;font-size:22px}
.rhero p{margin:0;color:#c7d3ea;font-size:13.5px}
.chipset{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.ctx{display:inline-block;font-size:12px;background:rgba(255,255,255,.1);border:1px solid var(--navy-line);border-radius:8px;padding:4px 10px;color:#e7edf7}
.res{padding:10px 13px;border-radius:8px;font-size:12.5px;line-height:1.6;margin-bottom:8px}
.res.ok{background:var(--navy-tint);color:var(--navy);border-left:3px solid var(--accent)}
.res.gap{background:var(--warn-bg);color:var(--warn-text);border-left:3px solid var(--warn)}
.res.und{background:var(--undet-bg);color:var(--undet);border-left:3px solid var(--undet-line)}
.stat-row{display:flex;flex-wrap:wrap;gap:10px;margin:6px 0 4px}
.stat{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 16px;text-align:center;min-width:96px}
.stat b{display:block;font-size:22px;color:var(--navy)}
.stat span{font-size:11px;color:var(--muted)}
.incentive{background:linear-gradient(180deg,#fff,#f4f7ff);border:1px solid var(--navy);border-radius:var(--r);padding:20px 22px;margin-bottom:14px}
.incentive h3{margin:0 0 6px;color:var(--navy);font-size:16px}
.incentive p{margin:0 0 12px;font-size:13px;color:var(--muted);line-height:1.7}
.model-switch{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 14px}

@media(max-width:760px){
  .shell-body{grid-template-columns:1fr}
  .illus{border-right:none;border-bottom:1px solid var(--line);padding:18px}
  .illus svg{width:140px;height:auto}
}
@media(max-width:640px){
  .nav-in{height:56px;gap:10px;padding:0 14px}
  .nav-title{font-size:13px}
  .wrap{padding:0 16px 50px}
  .hero h1{font-size:26px}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* scope band — Step 3 shares Step 5's stage taxonomy (linked by stage number + order, single accent) */
.scope-band{display:flex;flex-wrap:wrap;align-items:stretch;gap:6px}
.scope-cell{flex:1 1 130px;min-width:130px;border:1.5px solid var(--line);background:#fff;border-radius:9px;padding:10px 11px;font-size:12.5px;cursor:pointer;color:var(--ink);display:flex;align-items:center;gap:8px;line-height:1.4}
.scope-cell:hover{border-color:var(--navy)}
.scope-cell.on{border-color:var(--navy);box-shadow:inset 0 0 0 1px var(--navy);font-weight:600;color:var(--navy);background:var(--navy-tint)}
.snum{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--line);font-size:10.5px;font-weight:700;color:var(--faint);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.scope-cell.on .snum,.scope-enable.on .snum,.phase-h.ctrl .snum{background:var(--navy);border-color:var(--navy);color:#fff}
.scope-arrow{align-self:center;color:#c3ccdd;font-size:12px;flex-shrink:0}
.scope-enable{margin-top:8px;border:1.5px dashed var(--navy-line);border-left:4px solid var(--navy);background:var(--navy-tint);border-radius:9px;padding:11px 13px;cursor:pointer;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.scope-enable.on{box-shadow:inset 0 0 0 1px var(--navy)}
.scope-enable b{color:var(--navy);font-size:13px}
.scope-en-note{font-size:11.5px;color:var(--muted)}
.ctrl-tag{font-size:10.5px;font-weight:700;color:#fff;background:var(--navy);border-radius:99px;padding:2px 8px;margin-left:auto;white-space:nowrap}
.stg-ic{width:22px;height:22px;flex-shrink:0}
.scope-cell .stg-ic{color:var(--faint)}
.scope-cell.on .stg-ic{color:var(--navy)}
.scope-enable .stg-ic{color:var(--navy)}
.consent-line{display:flex;gap:9px;align-items:flex-start;margin-top:14px;max-width:440px;font-size:12.8px;color:var(--ink);line-height:1.5;cursor:pointer}
.consent-line input{margin-top:2px;width:16px;height:16px;flex-shrink:0;accent-color:var(--navy);cursor:pointer}
.anon-note{display:flex;align-items:center;gap:10px;margin:2px 0 22px;padding:11px 16px;border:1px solid var(--line);border-radius:12px;background:#fff;font-size:12.8px;color:var(--muted);line-height:1.55}
.anon-note .lk{width:26px;height:26px;border-radius:8px;background:var(--navy-tint);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.anon-note .lk svg{width:14px;height:14px;color:var(--navy)}
.anon-note b{color:var(--navy);font-weight:600}

/* v0.2 specification-aligned components */
.choice-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.choice-card{background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:13px 14px;cursor:pointer;min-height:82px;transition:border-color .12s ease,background .12s ease}
.choice-card:hover{border-color:var(--navy)}
.choice-card.on{border-color:var(--navy);background:var(--navy-tint);box-shadow:inset 3px 0 0 var(--accent)}
.choice-card.disabled{opacity:.55;cursor:not-allowed;background:#f6f7fa}
.choice-card .ct{font-size:13.5px;font-weight:700;color:var(--navy);line-height:1.45}
.choice-card .cd{font-size:11.8px;color:var(--muted);line-height:1.55;margin-top:4px}
.focus-tag{display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 13px;margin-bottom:10px;font-size:12.5px;color:var(--muted)}
.focus-tag b{color:var(--navy)}
.status-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(125px,1fr));gap:8px;margin-top:10px}
.status-box{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 12px;text-align:center}
.status-box b{display:block;color:var(--navy);font-size:21px;line-height:1.2}
.status-box span{font-size:10.8px;color:var(--muted)}
.mini-list{display:grid;gap:7px;margin-top:8px}
.mini-item{background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 11px;font-size:12.2px;color:var(--ink)}
.exit-card{background:#fff;border:1px solid var(--warn-line);border-radius:12px;padding:22px;margin-top:8px}
.exit-card h3{margin:0 0 8px;color:var(--navy);font-size:18px}
.exit-card p{margin:0 0 12px;color:var(--muted);font-size:13px;line-height:1.75}

/* ===== PDF print report ===== */
#printRoot{display:none}
@media print{
 @page{size:A4;margin:15mm}
 body.printing>*:not(#printRoot){display:none!important}
 body.printing #printRoot{display:block!important;font-family:inherit;font-size:11.5px;color:#111;line-height:1.7}
 #printRoot h1{font-size:22px;margin:0 0 4px;color:#10172b}
 #printRoot .psub{font-size:12.5px;color:#555;margin-bottom:14px}
 #printRoot h2{font-size:14.5px;margin:18px 0 8px;color:#10172b;border-bottom:2px solid #10172b;padding-bottom:4px}
 #printRoot h3{font-size:12px;margin:10px 0 4px;color:#10172b}
 #printRoot table{width:100%;border-collapse:collapse;font-size:10.5px;margin:6px 0}
 #printRoot td,#printRoot th{border:1px solid #9aa3b5;padding:4px 7px;text-align:left;vertical-align:top}
 #printRoot th{background:#e8ecf3}
 #printRoot .pcard{border:1px solid #b9c2d4;border-radius:6px;padding:10px 12px;margin:8px 0;break-inside:avoid}
 #printRoot .pmuted{color:#555;font-size:10.5px;line-height:1.65}
 #printRoot .pnote{background:#f2f4f8;border-left:3px solid #10172b;padding:7px 10px;margin:6px 0;break-inside:avoid}
 #printRoot .pb{break-before:page}
 #printRoot .pcover{border:2px solid #10172b;border-radius:8px;padding:22px 24px;margin-bottom:16px}
}

ationale": "能源效率、材料、可靠性、耐久性、控制能力及法規條件可以在設計與交付前轉化為產品或工程價值。", "qpass": null, "qfail": null, "name_en": "Model 1 | Circular-value-embedded product sales", "rationale_en": "Energy efficiency, materials, reliability, durability, control capability and regulatory conditions can be translated into product or engineering value before design and delivery.", "qpass_en": "", "qfail_en": ""}, {"mode": "M2", "name": "模式二｜產品生命週期價值服務", "strength": "CONDITIONAL", "rationale": "設備與模組可以接近、拆換、維修、升級及重新驗證，且客戶願意支付維護或性能恢復費用。", "qpass": "設備與模組可以接近、拆換、維修、升級及重新驗證，且客戶願意支付維護或性能恢復費用。", "qfail": "構件永久黏結、拆除會破壞主體，或服務只能作用於整棟建築而無法清楚對應本次產品線。", "name_en": "Model 2 | Product life-cycle value services", "rationale_en": "Equipment and modules can be accessed, replaced, repaired, upgraded and re-validated, and the customer is willing to pay for maintenance or performance recovery.", "qpass_en": "Equipment and modules can be accessed, replaced, repaired, upgraded and re-validated, and the customer is willing to pay for maintenance or performance recovery.", "qfail_en": "Components are permanently bonded and removal damages the structure, or the service acts only on the whole building and cannot be clearly attributed to this product line."}, {"mode": "M3", "name": "模式三｜資產責任保留型使用／績效服務", "strength": "CONDITIONAL", "rationale": "Product in Focus 是完整系統，供應方能控制設備、感測、控制及維護，並能對舒適度、可用率或能源績效負責。", "qpass": "Product in Focus 是完整系統，供應方能控制設備、感測、控制及維護，並能對舒適度、可用率或能源績效負責。", "qfail": "公司只供應單一散熱器、光源或控制零件，而客戶付費的結果主要由建築、安裝、其他設備或使用方式決定。", "name_en": "Model 3 | Use / performance services with retained asset responsibility", "rationale_en": "The Product in Focus is a complete system; the supplier can control equipment, sensing, controls and maintenance, and can be accountable for comfort, availability or energy performance.", "qpass_en": "The Product in Focus is a complete system; the supplier can control equipment, sensing, controls and maintenance, and can be accountable for comfort, availability or energy performance.", "qfail_en": "The company supplies only a single radiator, light source or control part, while the outcome the customer pays for is mainly determined by the building, installation, other equipment or usage patterns."}], "PT05": [{"mode": "M1", "name": "模式一｜循環價值內嵌型產品銷售", "strength": "STRONG", "rationale": "耐久性、標準化、材料選擇及追蹤設計可以提高產品價值，並降低遺失、損壞與物流成本。", "qpass": null, "qfail": null, "name_en": "Model 1 | Circular-value-embedded product sales", "rationale_en": "Durability, standardisation, material selection and tracking design can raise product value and reduce loss, damage and logistics cost.", "qpass_en": "", "qfail_en": ""}, {"mode": "M2", "name": "模式二｜產品生命週期價值服務", "strength": "STRONG", "rationale": "產品可以檢查、清潔、修復、重新驗證及再次投入使用；大量標準化回流也能降低單次處理成本。", "qpass": null, "qfail": null, "name_en": "Model 2 | Product life-cycle value services", "rationale_en": "Products can be inspected, cleaned, repaired, re-validated and returned to use; large-scale standardised return flow also lowers per-unit handling cost.", "qpass_en": "", "qfail_en": ""}, {"mode": "M3", "name": "模式三｜資產責任保留型使用／績效服務", "strength": "STRONG", "rationale": "客戶可以按租期、使用次數或循環服務付費，供應方則管理資產池、追蹤、取回、維修與再配置。同一資產可以在多次循環中形成收入。", "qpass": null, "qfail": null, "name_en": "Model 3 | Use / performance services with retained asset responsibility", "rationale_en": "Customers can pay by rental period, number of uses or circular service, while the supplier manages the asset pool, tracking, recovery, repair and reallocation. The same asset can generate revenue across multiple cycles.", "qpass_en": "", "qfail_en": ""}], "PT06": [{"mode": "M1", "name": "模式一｜循環價值內嵌型產品銷售", "strength": "STRONG", "rationale": "可靠性、精度、材料、模組化及產品資料可以在出售前形成品質、保固與產品差異。", "qpass": null, "qfail": null, "name_en": "Model 1 | Circular-value-embedded product sales", "rationale_en": "Reliability, precision, materials, modularity and product data can form quality, warranty and product differentiation before the sale.", "qpass_en": "", "qfail_en": ""}, {"mode": "M2", "name": "模式二｜產品生命週期價值服務", "strength": "STRONG_CONDITIONAL", "rationale": "產品使用強度或精度要求較高，校正、維修、升級或翻新後仍具有足夠使用價值，而且全部處理成本低於可恢復價值。", "qpass": "產品使用強度或精度要求較高，校正、維修、升級或翻新後仍具有足夠使用價值，而且全部處理成本低於可恢復價值。", "qfail": "產品價格低、零件封閉或修復後無法可靠校正，導致人工、備件及測試成本接近或高於新品價值。", "name_en": "Model 2 | Product life-cycle value services", "rationale_en": "Usage intensity or precision requirements are high; after calibration, repair, upgrade or refurbishment the product retains sufficient use value, and total handling cost is lower than the recoverable value.", "qpass_en": "Usage intensity or precision requirements are high; after calibration, repair, upgrade or refurbishment the product retains sufficient use value, and total handling cost is lower than the recoverable value.", "qfail_en": "The product is low-priced, parts are closed, or reliable calibration is not possible after repair, so labour, spare-part and testing cost approaches or exceeds the value of a new unit."}, {"mode": "M3", "name": "模式三｜資產責任保留型使用／績效服務", "strength": "CONDITIONAL", "rationale": "客戶具有短期、波動或專案型需求，工具使用量可以追蹤，而且供應方能管理資產池、損壞責任及快速調度。", "qpass": "客戶具有短期、波動或專案型需求，工具使用量可以追蹤，而且供應方能管理資產池、損壞責任及快速調度。", "qfail": "使用頻率過低、資產分散、遺失與損壞風險高，或客戶長期持有的成本明顯低於租賃與服務價格。", "name_en": "Model 3 | Use / performance services with retained asset responsibility", "rationale_en": "Customers have short-term, fluctuating or project-based needs, tool usage can be tracked, and the supplier can manage the asset pool, damage liability and rapid dispatch.", "qpass_en": "Customers have short-term, fluctuating or project-based needs, tool usage can be tracked, and the supplier can manage the asset pool, damage liability and rapid dispatch.", "qfail_en": "Usage frequency is too low, assets are dispersed with high loss and damage risk, or the customer's long-term ownership cost is clearly lower than rental and service prices."}], "PT07": [{"mode": "M1", "name": "模式一｜循環價值內嵌型產品銷售", "strength": "STRONG", "rationale": "材料、能源效率、軟體支援、可維修性、關鍵材料及資料證據均能影響產品銷售、市場准入與客戶採購。", "qpass": null, "qfail": null, "name_en": "Model 1 | Circular-value-embedded product sales", "rationale_en": "Materials, energy efficiency, software support, repairability, critical materials and data evidence can all influence product sales, market access and customer procurement.", "qpass_en": "", "qfail_en": ""}, {"mode": "M2", "name": "模式二｜產品生命週期價值服務", "strength": "CONDITIONAL", "rationale": "零件可以取得，軟體持續支援，資料可以安全清除，而且翻新產品具有穩定市場。", "qpass": "零件可以取得，軟體持續支援，資料可以安全清除，而且翻新產品具有穩定市場。", "qfail": "產品採用封閉結構、零件配對或停止軟體支援，修復後亦因快速技術淘汰而缺乏使用與再次交易價值。", "name_en": "Model 2 | Product life-cycle value services", "rationale_en": "Parts are available, software support continues, data can be securely erased, and refurbished products have a stable market.", "qpass_en": "Parts are available, software support continues, data can be securely erased, and refurbished products have a stable market.", "qfail_en": "The product uses a closed structure, part-pairing or discontinued software support, and after repair it lacks use and re-trade value due to rapid technological obsolescence."}, {"mode": "M3", "name": "模式三｜資產責任保留型使用／績效服務", "strength": "CONDITIONAL", "rationale": "客戶是企業或機構，設備可以集中管理，供應方能提供維修、替換、資安、取回及再次部署服務。", "qpass": "客戶是企業或機構，設備可以集中管理，供應方能提供維修、替換、資安、取回及再次部署服務。", "qfail": "產品主要面向一般消費者，客戶重視個人所有權，且資料隱私、遺失、損壞及分散回流成本無法有效控制。", "name_en": "Model 3 | Use / performance services with retained asset responsibility", "rationale_en": "The customer is an enterprise or institution, devices can be centrally managed, and the supplier can provide repair, replacement, data security, recovery and redeployment services.", "qpass_en": "The customer is an enterprise or institution, devices can be centrally managed, and the supplier can provide repair, replacement, data security, recovery and redeployment services.", "qfail_en": "The product is aimed mainly at general consumers who value personal ownership, and data privacy, loss, damage and dispersed return costs cannot be effectively controlled."}], "PT08": [{"mode": "M1", "name": "模式一｜循環價值內嵌型產品銷售", "strength": "STRONG", "rationale": "材料利用、耐久性、模組化、可拆解及產品資訊能夠在出售前影響成本、品質與產品差異。", "qpass": null, "qfail": null, "name_en": "Model 1 | Circular-value-embedded product sales", "rationale_en": "Material use, durability, modularity, disassembly and product information can influence cost, quality and product differentiation before the sale.", "qpass_en": "", "qfail_en": ""}, {"mode": "M2", "name": "模式二｜產品生命週期價值服務", "strength": "CONDITIONAL", "rationale": "產品可以無損拆解、更換表面或零件、重新配置與品質分級，而且再次使用或銷售價值高於回流、修復、庫存及物流成本。", "qpass": "產品可以無損拆解、更換表面或零件、重新配置與品質分級，而且再次使用或銷售價值高於回流、修復、庫存及物流成本。", "qfail": "產品採永久黏合結構、單位剩餘價值低、運輸體積大，或市場不接受翻新產品。", "name_en": "Model 2 | Product life-cycle value services", "rationale_en": "Products can be disassembled without damage, resurfaced or re-parted, reconfigured and quality-graded, and their reuse or resale value exceeds return, repair, inventory and logistics cost.", "qpass_en": "Products can be disassembled without damage, resurfaced or re-parted, reconfigured and quality-graded, and their reuse or resale value exceeds return, repair, inventory and logistics cost.", "qfail_en": "The product uses a permanently bonded structure, has low unit residual value or large transport volume, or the market does not accept refurbished products."}, {"mode": "M3", "name": "模式三｜資產責任保留型使用／績效服務", "strength": "CONDITIONAL", "rationale": "產品用於辦公室、共享場域或其他集中環境，需求可以標準化，供應方也能管理配置、維護、取回及再部署。", "qpass": "產品用於辦公室、共享場域或其他集中環境，需求可以標準化，供應方也能管理配置、維護、取回及再部署。", "qfail": "產品主要由家庭長期持有，規格高度個人化，使用密度低，而且回流與重新配置成本過高。", "name_en": "Model 3 | Use / performance services with retained asset responsibility", "rationale_en": "Products are used in offices, shared venues or other centralised settings, demand can be standardised, and the supplier can manage allocation, maintenance, recovery and redeployment.", "qpass_en": "Products are used in offices, shared venues or other centralised settings, demand can be standardised, and the supplier can manage allocation, maintenance, recovery and redeployment.", "qfail_en": "The product is mainly held long-term by households, is highly personalised in specification, has low usage density, and its return and reconfiguration cost is too high."}], "PT09": [{"mode": "M1", "name": "模式一｜循環價值內嵌型產品銷售", "strength": "STRONG", "rationale": "設計、材料、可靠性、供應及合規條件可以在銷售前影響產品價值、品質與下游客戶接受。", "qpass": null, "qfail": null, "name_en": "Model 1 | Circular-value-embedded product sales", "rationale_en": "Design, materials, reliability, supply and compliance conditions can influence product value, quality and downstream customer acceptance before the sale.", "qpass_en": "", "qfail_en": ""}, {"mode": "M2", "name": "模式二｜產品生命週期價值服務", "strength": "STRONG", "rationale": "核心件若可以取得、診斷、拆解、修復、測試及再製，便具有清楚的交換、再製及再次交易價值。", "qpass": null, "qfail": null, "name_en": "Model 2 | Product life-cycle value services", "rationale_en": "If cores can be obtained, diagnosed, disassembled, repaired, tested and remanufactured, they carry clear exchange, remanufacturing and re-trade value.", "qpass_en": "", "qfail_en": ""}, {"mode": "M3", "name": "模式三｜資產責任保留型使用／績效服務", "strength": "CONDITIONAL", "rationale": "模組可以獨立識別及監測，供應方能取得運轉資料、控制維護，並對運轉時間或可用率承擔責任。", "qpass": "模組可以獨立識別及監測，供應方能取得運轉資料、控制維護，並對運轉時間或可用率承擔責任。", "qfail": "模組完全嵌入下游整機，供應方無法接觸設備、取得資料或區分模組問題與整機其他因素。", "name_en": "Model 3 | Use / performance services with retained asset responsibility", "rationale_en": "Modules can be individually identified and monitored, and the supplier can obtain operating data, control maintenance and take responsibility for operating time or availability.", "qpass_en": "Modules can be individually identified and monitored, and the supplier can obtain operating data, control maintenance and take responsibility for operating time or availability.", "qfail_en": "The module is fully embedded in a downstream finished machine; the supplier cannot access the equipment, obtain data, or separate module issues from other factors in the machine."}], "PT10": [{"mode": "M1", "name": "模式一｜循環價值內嵌型產品銷售", "strength": "STRONG", "rationale": "能源、材料、品質、保固、維修設計及合規條件都能在出售前進入產品經濟性。", "qpass": null, "qfail": null, "name_en": "Model 1 | Circular-value-embedded product sales", "rationale_en": "Energy, materials, quality, warranty, repair design and compliance conditions can all enter product economics before the sale.", "qpass_en": "", "qfail_en": ""}, {"mode": "M2", "name": "模式二｜產品生命週期價值服務", "strength": "CONDITIONAL", "rationale": "修復後仍有足夠剩餘壽命，客戶避免的新品替換、搬運及重新安裝價值，高於到府人工、備件、物流及測試成本。", "qpass": "修復後仍有足夠剩餘壽命，客戶避免的新品替換、搬運及重新安裝價值，高於到府人工、備件、物流及測試成本。", "qfail": "新品價格低、產品已接近使用壽命末端，或維修與搬運成本接近新品替換成本。", "name_en": "Model 2 | Product life-cycle value services", "rationale_en": "Sufficient remaining life exists after repair, and the replacement, transport and reinstallation the customer avoids is worth more than on-site labour, spare parts, logistics and testing cost.", "qpass_en": "Sufficient remaining life exists after repair, and the replacement, transport and reinstallation the customer avoids is worth more than on-site labour, spare parts, logistics and testing cost.", "qfail_en": "New-unit prices are low, the product is already near end of life, or repair and transport cost approaches the cost of replacement."}, {"mode": "M3", "name": "模式三｜資產責任保留型使用／績效服務", "strength": "BASIC_NOT_OPEN", "rationale": "一般家庭的停機損失、使用密度及資產管理負擔，通常不足以覆蓋供應方的融資、監測、到府維護、取回與再部署成本。租賃住宅、宿舍或集中物業可在後續擴充版另設模式三情境。", "qpass": null, "qfail": null, "name_en": "Model 3 | Use / performance services with retained asset responsibility", "rationale_en": "For typical households, downtime loss, usage intensity and asset-management burden are usually insufficient to cover the supplier's financing, monitoring, on-site maintenance, recovery and redeployment cost. Rental housing, dormitories or centrally managed properties may be added as a Model 3 scenario in a later extension.", "qpass_en": "", "qfail_en": ""}]}, "actions": [{"id": "6-1", "zh": "循環設計", "en": "Design for Circularity", "q": "就本次產品而言，貴公司是否在設計或開發時，明確要求產品更容易維修、保養、升級、拆解、再次使用、翻新、再製造或回收？"}, {"id": "6-2", "zh": "循環資源選用", "en": "Circular Sourcing", "q": "就本次產品而言，貴公司是否實際選用或明確要求再生材料、符合條件的可再生資源、原生資源替代方案，或避免特定令人關切的有害物質？"}, {"id": "6-3", "zh": "循環採購", "en": "Circular Procurement", "q": "貴公司是否把與產品壽命、材料來源、維修、回收或生命週期成本有關的要求，正式放進採購規格、供應商評選、合約或驗收流程？"}, {"id": "6-4", "zh": "製程優化", "en": "Process Optimization", "q": "貴公司是否曾改變本產品的生產或相關流程，使每單位產品使用較少材料、能源或水，或產生較少廢料、損失與排放，並有改善前後的比較？"}, {"id": "6-5", "zh": "產業、區域或城市共生", "en": "Industrial, Regional or Urban Symbiosis", "q": "貴公司是否與另一個組織建立持續運作的資源共享或交換，讓一方的剩餘能源、水、副產品、材料或閒置設施成為另一方的投入？"}, {"id": "6-6", "zh": "減量、再使用與變更用途", "en": "Reduce, Reuse and Repurpose", "q": "貴公司是否曾避免製造或購買新的產品／資源，或讓使用過的產品、零組件在不被破壞的情況下再次使用，或改作其他用途？"}, {"id": "6-7", "zh": "維護與維修", "en": "Maintenance and Repair", "q": "貴公司是否對本產品提供或執行定期保養、狀態監測或故障維修，使產品能維持或恢復原有功能，而不是因故障提早報廢？"}, {"id": "6-8", "zh": "績效導向循環模式", "en": "Performance-based Approaches", "q": "貴公司是否不是單純出售產品，而是以租賃、訂閱、按使用量或按績效收費提供產品功能，並由貴公司或指定方持續承擔維護、回收或生命週期末責任？"}, {"id": "6-9", "zh": "透過共享提升使用密集度", "en": "Sharing to Intensify Use", "q": "貴公司是否建立一個可運作的機制，讓多位使用者依序或共同使用同一項耐用產品或資產，並因此提高使用率或減少新增產品需求？"}, {"id": "6-10", "zh": "翻新", "en": "Refurbishing", "q": "貴公司是否把使用過的整項產品收回後，進行有限度修復、零件更換或軟硬體更新，使它恢復原有或接近原有功能，再次投入使用？"}, {"id": "6-11", "zh": "再製造", "en": "Remanufacturing", "q": "貴公司是否以標準化、工業化程序處理使用過的產品或核心零件，使其功能、性能與品質達到或高於新品水準，並提供完整保固？"}, {"id": "6-12", "zh": "逆向物流", "en": "Reverse Logistics", "q": "貴公司是否已有可運作的退回、收集、運輸、分類或儲存安排，能把使用過、淘汰或剩餘的產品／零件帶回再使用、翻新、再製造或回收節點？"}, {"id": "6-13", "zh": "資源層級利用", "en": "Cascading of Resources", "q": "貴公司是否為同一項產品、零件或材料安排至少兩個依序發生的用途，先保留較高功能或價值，再進入較低階用途，最後才回收或處理？"}, {"id": "6-14", "zh": "回收", "en": "Recycling", "q": "就本次產品相關的使用後物或廢料而言，貴公司是否自行或透過明確安排，進行物理、化學或生物處理，產出可再次使用的材料或資源，並能掌握輸入、處理、輸出與去向？"}, {"id": "6-15", "zh": "廢棄物管理", "en": "Waste Management", "q": "貴公司是否已對本產品相關製程或回收活動產生的廢棄物，建立辨識、分類、儲存、移交、處理與最終處置安排，並能追蹤主要數量或去向？"}, {"id": "6-16", "zh": "材料回復", "en": "Material Recovery", "q": "貴公司是否從廢棄物流中，透過特定程序分離或提取某一種有價值材料，並讓該材料重新進入供應鏈或生產使用？"}, {"id": "6-17", "zh": "能源回收", "en": "Energy Recovery", "q": "對於已確認無法再使用、翻新、再製造或材料回收的剩餘物，貴公司是否安排將其轉為實際被利用的熱能、電力或其他能源？"}, {"id": "6-18", "zh": "生態系統再生", "en": "Regenerate Ecosystems", "q": "貴公司的產品、材料來源或營運是否與某一個已退化的土壤、水域、棲地或其他自然系統有關，且貴公司已採取措施使其生態功能相較基準狀態獲得恢復？"}, {"id": "6-19", "zh": "教育與研究", "en": "Education and Research", "q": "貴公司是否已針對循環經濟，實施明確的教育、專業培訓或研究，使員工具備新的循環能力，或產生可用於循環轉型的新知與方法？"}, {"id": "6-20", "zh": "創新", "en": "Innovation", "q": "貴公司是否為了解決一個明確的資源、延壽、回流或價值回復問題，開發、測試或導入相較既有做法有實質新變化的技術、產品、制度或商業模式？"}, {"id": "6-21", "zh": "協作與網絡", "en": "Collaboration and Networks", "q": "貴公司是否與其他部門或外部組織，為一個明確的循環目標建立持續合作，分配角色、共享資料或資源，並共同執行實際行動？"}, {"id": "6-22", "zh": "協助使用者改變行為", "en": "Helping Users Change Their Behaviour", "q": "貴公司是否針對一項明確的使用者行為，例如減量、正確使用、維修、共享、歸還或回收，提供容易採用的替代方案或介入，並觀察使用者是否真的改變行為？"}, {"id": "6-23", "zh": "政策與法律體系", "en": "Policy and Legal System", "q": "貴公司或所屬組織是否具有正式治理權限，並已制定、實施或修訂適用於特定對象的循環政策、規則、義務、誘因、產品責任或公共採購制度？"}, {"id": "6-24", "zh": "金融服務", "en": "Financial Services", "q": "貴公司、金融合作方或資金提供者是否把明確的循環條件納入投資、授信、保險或資金配置，且該條件實際影響資金是否提供、金額、價格或風險管理？"}, {"id": "6-25", "zh": "數位化", "en": "Digitalization", "q": "貴公司是否使用產品識別、感測、資料平台或資料交換等數位技術，實際支援本產品的維修、資源管理、回收、再使用、翻新或生命週期決策？"}], "statuses": [{"code": "IMPLEMENTED", "label": "已執行", "label_en": "Implemented"}, {"code": "PLANNED", "label": "規劃中", "label_en": "Planned"}, {"code": "NOT_IMPLEMENTED", "label": "尚未執行", "label_en": "Not implemented"}, {"code": "EXTERNAL_CONTROL", "label": "本行動由其他價值鏈角色掌握", "label_en": "Mainly managed by another value-chain actor"}, {"code": "SELF_NOT_APPLICABLE", "label": "自評不適用", "label_en": "Self-assessed N/A"}, {"code": "UNCERTAIN", "label": "不確定", "label_en": "Uncertain"}], "b": {"6-1": {"BD03": "P", "BD05": "P", "BD06": "S", "BD09": "S", "BD10": "S", "BD11": "P"}, "6-2": {"BD01": "P", "BD08": "P", "BD09": "P", "BD10": "S"}, "6-3": {"BD01": "S", "BD08": "P", "BD09": "P", "BD10": "P", "BD16": "S"}, "6-4": {"BD01": "P", "BD02": "P", "BD09": "S", "BD11": "S", "BD12": "S"}, "6-5": {"BD01": "P", "BD08": "S", "BD11": "P", "BD14": "S", "BD16": "P"}, "6-6": {"BD01": "P", "BD05": "P", "BD07": "P", "BD11": "S"}, "6-7": {"BD03": "P", "BD04": "P", "BD05": "P", "BD06": "S", "BD10": "S", "BD17": "S"}, "6-8": {"BD03": "P", "BD04": "S", "BD06": "P", "BD07": "P", "BD10": "S", "BD11": "S", "BD15": "P"}, "6-9": {"BD01": "S", "BD03": "S", "BD06": "P", "BD07": "P", "BD13": "S", "BD16": "S"}, "6-10": {"BD05": "P", "BD06": "P", "BD07": "S", "BD10": "S", "BD11": "P", "BD13": "S"}, "6-11": {"BD01": "S", "BD05": "P", "BD06": "P", "BD09": "S", "BD10": "S", "BD11": "P"}, "6-12": {"BD05": "S", "BD06": "S", "BD07": "P", "BD09": "S", "BD10": "P", "BD11": "P"}, "6-13": {"BD05": "P", "BD08": "S", "BD11": "P", "BD16": "P"}, "6-14": {"BD01": "S", "BD08": "P", "BD09": "P", "BD10": "S", "BD11": "P"}, "6-15": {"BD01": "S", "BD09": "P", "BD10": "P", "BD11": "P", "BD14": "S"}, "6-16": {"BD01": "S", "BD08": "P", "BD09": "S", "BD10": "P", "BD11": "P"}, "6-17": {"BD01": "P", "BD09": "P", "BD10": "S", "BD11": "P"}, "6-18": {"BD08": "S", "BD09": "S", "BD10": "P", "BD13": "S", "BD14": "P"}, "6-19": {"BD02": "S", "BD12": "P", "BD16": "S", "BD17": "P"}, "6-20": {"BD01": "S", "BD06": "P", "BD11": "S", "BD12": "P", "BD13": "S"}, "6-21": {"BD08": "S", "BD10": "P", "BD11": "S", "BD12": "S", "BD13": "S", "BD16": "P"}, "6-22": {"BD04": "P", "BD05": "S", "BD06": "S", "BD11": "P", "BD13": "P"}, "6-23": {"BD06": "S", "BD09": "P", "BD10": "P", "BD15": "S", "BD16": "S"}, "6-24": {"BD07": "P", "BD09": "S", "BD10": "P", "BD12": "S", "BD15": "P"}, "6-25": {"BD02": "P", "BD03": "P", "BD06": "S", "BD07": "P", "BD09": "S", "BD10": "P", "BD11": "P", "BD16": "S"}}, "a": {"BD01": {"M1": {"g": "P", "why": "單位合格產品所需的原料、能源與用水下降，或製程邊料、報廢及能源損失減少，會降低每件合格產品的直接成本。因果鏈為：資源投入與損失下降 → 單位合格產品成本下降 → M1-C1 材料及製造成本下降 → 產品毛利提高。若廢棄物產生量、處理量或生產者責任費用同步下降，亦會降低 M1-C4 合規及生命週期末責任成本。"}, "M2": {"g": "S", "why": "維修、翻新及再製仍需使用零件、材料、能源、清洗用水與測試資源。單次成功修復所需投入下降 → M2-C1 診斷、工時及備件成本下降；修復失敗、耗材浪費及材料報廢減少 → M2-C4 重工、保固及不可回復損失下降 → 每件成功恢復產品的服務毛利提高。"}, "M3": {"g": "S", "why": "若供應方承擔資產製造、能源、耗材、清洗或維護成本，降低每項資產製造及運作所需資源 → M3-C1 或 M3-C3 下降；降低每次翻新所需材料與能源 → M3-C5 下降 → 每單位可收費功能的生命週期成本下降。"}}, "BD02": {"M1": {"g": "P", "why": "良率與吞吐量提高 → 單件產品分攤的人力、設備與材料損失下降 → M1-C1 材料及製造成本下降。製程缺陷與重工下降 → 出貨後品質問題減少 → M1-C3 保固與品質成本下降。若企業原本受產能或交期限制，產出與交付效率改善亦可提高或保護 M1-R1 產品銷售收入。"}, "M2": {"g": "P", "why": "診斷、拆解、修復與測試效率提高 → 單件工時及等待時間下降 → M2-C1 下降；回流產品停留時間縮短 → M2-C3 下降；首次修復成功率提高 → M2-C4 下降；相同人力可完成更多服務與翻新品 → M2-R1、M2-R2 上升。"}, "M3": {"g": "P", "why": "資產調度、維護排程與故障處理效率提高 → 閒置及停機時間縮短 → 利用率與可用率提高 → M3-R1 上升；維護與現場服務效率提高 → M3-C3、M3-C4 下降。取回與翻新週期縮短 → 資產更快進入下一輪部署 → M3-R2 上升、M3-C5 下降。"}}, "BD03": {"M1": {"g": "P", "why": "故障率下降與修復時間縮短 → 退貨、換機、客訴、保固工時及備件支出下降 → M1-C3 保固與品質成本下降。品質聲譽與購買信心提高 → M1-R1 產品銷售收入上升或受到保護。"}, "M2": {"g": "P", "why": "可維修性與診斷效率提高 → 修復工時、備件浪費及誤判下降 → M2-C1 下降；首次修復率提高 → M2-C4 下降；產品功能與剩餘價值更容易恢復 → M2-R2、M2-R3 上升。"}, "M3": {"g": "P", "why": "故障率下降與平均修復時間縮短 → 資產可用率提高 → M3-R1 上升；維護工時、備件及緊急服務下降 → M3-C3 下降；停機、賠償與履約失敗下降 → M3-C4 下降；可恢復性及資產品質提高 → M3-R2 上升。"}}, "BD04": {"M1": {"g": "S", "why": "客戶使用成本與停機損失下降 → 產品整體經濟價值提高 → 購買、得標、續購或價格接受度提高 → M1-R1 產品銷售收入上升。"}, "M2": {"g": "P", "why": "服務縮短停機並延後新品替換 → 客戶總持有成本下降 → 服務採用、續約及重複購買增加 → M2-R1、M2-R2 上升。服務品質提高 → 客訴與再次故障下降 → M2-C4 下降。"}, "M3": {"g": "P", "why": "客戶停機及自行管理資產的負擔下降 → 採用率、續約率、計費單價或合約期間提高 → M3-R1 上升；服務爭議與履約風險下降 → M3-C4 下降。"}}, "BD05": {"M1": {"g": "S", "why": "壽命、耐用性及可升級性提高 → 產品品質與客戶價值提高 → M1-R1 可能上升；故障與過早報廢下降 → M1-C3、M1-C4 下降。"}, "M2": {"g": "P", "why": "可恢復功能及剩餘價值提高 → 可維修、翻新或再製比例提高 → M2-C4 下降；再次交易機會增加 → M2-R2 上升；核心零件與回流產品殘值提高 → M2-R3 上升；標準化與可拆解性改善 → M2-C1 下降。"}, "M3": {"g": "P", "why": "資產可用年限與部署次數增加 → 可收費期間增加 → M3-R1 上升；資產取得成本分攤至更多收入週期 → M3-C1 下降；再部署能力及最終殘值提高 → M3-R2 上升。"}}, "BD06": {"M2": {"g": "P", "why": "建立維修、升級、翻新、再製及再銷售方案 → 可付費服務與再次交易次數增加 → M2-R1、M2-R2 上升；回流核心的商業用途增加 → M2-R3 上升。"}, "M3": {"g": "P", "why": "交易標的由產品所有權轉為使用、可用性或績效 → 資產在合約期間持續收費 → M3-R1 上升；合約結束後再次部署或出售 → M3-R2 上升。"}}, "BD07": {"M2": {"g": "P", "why": "回流產品快速檢測、分流與修復 → 在製品與待修庫存時間下降 → M2-C3 下降；備件及交換機配置改善 → 服務等待下降 → M2-R1、M2-R2 上升；錯配與緊急處理下降 → M2-C1 下降。"}, "M3": {"g": "P", "why": "資產閒置時間下降與部署率提高 → M3-R1 上升；相同收入所需資產數量下降 → M3-C1 及融資需求下降 → M3-C2 下降；取回與再部署週期縮短 → M3-C5 下降。"}}, "BD08": {"M1": {"g": "P", "why": "供應來源多元、替代材料或回復材料增加 → 缺料、停產與延遲交付機率下降 → M1-R1 受到保護；價格波動與緊急採購下降 → M1-C1 下降或趨於穩定。"}, "M2": {"g": "S", "why": "備件及回流核心來源穩定 → 缺件、等待及無法修復下降 → M2-R1、M2-R2 受到保護；緊急採購下降 → M2-C1 下降；不可修復與報廢下降 → M2-C4 下降。"}, "M3": {"g": "S", "why": "資產與備件供應穩定 → 維修等待與停機下降 → M3-R1 受到保護；緊急維修與替代支出下降 → M3-C3、M3-C4 下降；新資產價格及交期風險降低 → M3-C1 趨於穩定。"}}, "BD09": {"M1": {"g": "P", "why": "法規要求被正確納入產品及流程 → 產品取得或維持市場准入 → M1-R1 受到保護；違規、召回、罰款、整治及生命週期末責任損失下降 → M1-C4 下降；安全與品質違規下降亦可能降低 M1-C3。"}, "M2": {"g": "S", "why": "翻新、再製、二手銷售與回流活動符合要求 → 服務及再次交易可合法進行 → M2-R1、M2-R2 受到保護；錯誤分類、產品責任及不可銷售損失下降 → M2-C4 下降。"}, "M3": {"g": "S", "why": "契約、計費、資料、資產責任及取回安排符合要求 → 合約可以成立並持續履約 → M3-R1 受到保護；爭議、罰款、違約與產品責任下降 → M3-C4 下降。"}}, "BD10": {"M1": {"g": "P", "why": "產品與材料資料完整可追溯 → 客戶、採購方及主管機關可驗證產品 → 市場准入、得標與聲明可信度提高 → M1-R1 上升或受到保護；錯誤聲明、召回及責任下降 → M1-C4 下降。"}, "M2": {"g": "P", "why": "產品歷史、故障、換件及測試資料可取得 → 診斷與分流加快 → M2-C1、M2-C2 下降；等待與錯配下降 → M2-C3 下降；誤判與重工下降 → M2-C4 下降；翻新品品質與可信度提高 → M2-R1、M2-R2 上升。"}, "M3": {"g": "P", "why": "使用、績效與資產狀態資料可信 → 正確計費與收入漏損下降 → M3-R1 上升；預防維護與調度改善 → M3-C3 下降；計費爭議、履約及資產遺失下降 → M3-C4 下降；取回與再部署效率提高 → M3-C5 下降；風險可被評估 → M3-C2 下降。"}}, "BD11": {"M1": {"g": "S", "why": "企業承擔 take-back、生產者責任或材料回復時，回流效率提高 → 處置與責任成本下降 → M1-C4 下降；回復材料替代新材料 → M1-C1 下降；可信回收安排亦可能提高產品接受 → M1-R1 上升。"}, "M2": {"g": "P", "why": "回流量與可修復比例提高 → 翻新、再製及再銷售供料增加 → M2-R2、M2-R3 上升；收集與分流效率提高 → M2-C2 下降；不可回復與處置損失下降 → M2-C4 下降。"}, "M3": {"g": "P", "why": "資產按期取回且狀態可控 → 資產遺失與收入週期中斷下降 → M3-R1 受到保護；翻新及再部署成功率提高 → M3-R2 上升；每項資產產生更多收入週期 → M3-C1 下降；單位取回與處理成本下降 → M3-C5 下降。"}}, "BD12": {"M1": {"g": "S", "why": "試驗與學習速度提高 → 可行的新材料、設計與製程更快導入 → 產品競爭力與市場回應提高 → M1-R1 可能上升；有效技術降低製造、品質或合規成本 → M1-C1、M1-C3、M1-C4 可能下降。"}, "M2": {"g": "S", "why": "新診斷、維修、翻新、再製與市場方案更快成熟 → 可服務範圍與再次交易機會增加 → M2-R1、M2-R2、M2-R3 上升；有效技術降低工時、物流、庫存與失敗成本 → M2-C1 至 M2-C4 可能下降。"}, "M3": {"g": "S", "why": "新計價、調度、維護、數位與融資方式更快試驗 → 利用率、可用率、單價或合約期間提高 → M3-R1 上升；再部署方式改善 → M3-R2 上升；維護、融資、履約與再部署成本可能下降。"}}, "BD13": {"M1": {"g": "S", "why": "循環特性及企業承諾可信 → 客戶購買、得標與價格接受度提高 → M1-R1 上升；誤導性聲明、投訴及聲明責任下降 → M1-C4 下降。"}, "M2": {"g": "P", "why": "客戶信任維修品質、翻新品分級、安全與保固 → 採用率、重複購買及價格接受度提高 → M2-R1、M2-R2 上升；退貨、爭議與品質責任下降 → M2-C4 下降。"}, "M3": {"g": "P", "why": "客戶信任使用權、績效、計費及資產管理安排 → 採用、續約及合約期間提高 → M3-R1 上升；計費、服務、歸還與資料爭議下降 → M3-C4 下降。"}}, "BD15": {"M2": {"g": "S", "why": "回流庫存、備件及交換機取得合適融資 → 資金占用成本下降 → M2-C3 下降；可負擔的服務及翻新規模增加 → M2-R1、M2-R2 上升；品質保險與風險分攤降低重大損失 → M2-C4 下降。"}, "M3": {"g": "P", "why": "融資成本下降且資產風險可被評估與分攤 → M3-C2 下降；可負擔的資產池規模增加 → 可服務客戶與部署數增加 → M3-R1、M3-R2 上升。"}}, "BD16": {"M1": {"g": "S", "why": "共同規格與供應網絡成熟 → 材料搜尋、驗證及採購成本下降 → M1-C1 下降；物流與市場覆蓋效率提高 → M1-C2 下降、M1-R1 上升；回收及責任分工清楚 → M1-C4 下降。"}, "M2": {"g": "P", "why": "合作網絡覆蓋與標準化提高 → 回流搜尋、收集與運輸成本下降 → M2-C2 下降；技術與零件更易取得 → M2-C1 下降；庫存共享改善 → M2-C3 下降；服務及二次市場擴大 → M2-R1、M2-R2、M2-R3 上升。"}, "M3": {"g": "P", "why": "維護、融資、物流、數位及再部署網絡成熟 → 服務範圍、回應速度、利用率與可用率提高 → M3-R1 上升；單位維護及再部署成本下降 → M3-C3、M3-C5 下降；履約中斷風險下降 → M3-C4 下降；融資與風險分攤改善 → M3-C2 下降。"}}, "BD17": {"M1": {"g": "S", "why": "人員具備設計、材料、採購、製程及資料能力 → 錯誤與重工下降 → M1-C1、M1-C3 下降；合規與聲明錯誤下降 → M1-C4 下降；產品品質、交付及市場接受提高 → M1-R1 受到保護。"}, "M2": {"g": "P", "why": "診斷與修復能力標準化 → 工時、誤判與備件浪費下降 → M2-C1 下降；分流及庫存協作改善 → M2-C2、M2-C3 下降；重工、保固與安全風險下降 → M2-C4 下降；服務產能及品質提高 → M2-R1、M2-R2 上升。"}, "M3": {"g": "P", "why": "跨部門具備資產、維護、計費、資料、契約及風險管理能力 → 調度、維護與計費正確性提高 → M3-R1 上升；維護、履約及爭議成本下降 → M3-C3、M3-C4 下降；取回與再部署品質提高 → M3-C5 下降、M3-R2 上升。"}}}, "bdName": {"BD01": "材料、能源與用水成本效率", "BD02": "製程生產力、良率與營運效率", "BD03": "可靠性、維修與保固經濟性", "BD04": "客戶總持有成本、可用性與留存", "BD05": "產品壽命、殘值與價值保留", "BD06": "新收益、服務毛利與多次收益週期", "BD07": "資產利用率、庫存與營運資金", "BD08": "供應安全、關鍵材料與價格波動", "BD09": "市場進入、法規責任與環境負債", "BD10": "資料透明、追溯與聲明可信度", "BD11": "回流率、回復產率與生命週期末端成本", "BD12": "創新速度與策略選擇權", "BD13": "品牌信任、客戶接受與利害關係人價值", "BD14": "生態系統與自然資本韌性", "BD15": "融資、保險與資金成本", "BD16": "夥伴網絡、交易成本與規模經濟", "BD17": "人才能力、組織學習與變革執行力"}, "modeName": {"M1": "模式一｜循環價值內嵌型產品銷售", "M2": "模式二｜產品生命週期價值服務", "M3": "模式三｜資產責任保留型使用／績效服務"}, "modeName_en": {"M1": "Model 1 | Circular-value-embedded product sales", "M2": "Model 2 | Product life-cycle value services", "M3": "Model 3 | Use / performance services with retained asset responsibility"}};
var ROLE_Q_ZH='當要決定是否採用並推動這項作法，貴公司通常扮演哪一種決策角色？';
var ROLE_Q_EN='When deciding whether to adopt and drive this practice, what role does your company typically play?';
var ROLE_OPTIONS=[
 {code:'LEAD',zh:'貴公司可以主要決定並主導推動',en:'Your company can decide and lead this on its own'},
 {code:'CO_DECIDE',zh:'需要由貴公司與其他價值鏈角色共同決定',en:'This needs to be decided jointly with other value-chain actors'},
